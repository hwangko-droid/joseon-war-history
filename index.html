<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리가 알지 못했던 조선 전쟁사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root{
    --bg:#f7f7f8; --ink:#17171a; --sub:#8a8a92; --accent:#f2740a;
    --card:#ffffff; --line:#ececef; --shadow: 0 2px 10px rgba(20,20,25,0.06);
  }
  [data-theme="sepia"]{
    --bg:#efe6d3; --ink:#332a1c; --sub:#8a7a5c; --accent:#c85a12;
    --card:#faf3e3; --line:#e2d3b3; --shadow: 0 2px 10px rgba(60,45,20,0.10);
  }
  [data-theme="dark"]{
    --bg:#131316; --ink:#eceaea; --sub:#8f8d95; --accent:#ff8a3d;
    --card:#1d1d22; --line:#2b2b31; --shadow: 0 2px 14px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;
    transition:background .3s,color .3s;
    min-height:100vh;
  }
  [data-serif="on"] .prose, [data-serif="on"] .ch-title, [data-serif="on"] .cover h1{
    font-family:'Noto Serif KR',serif;
  }
  .app{max-width:720px;margin:0 auto;padding:0 18px 90px;}

  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--bg); border-bottom:1px solid var(--line);
    padding:12px 16px; display:flex; align-items:center; gap:8px;
    max-width:720px; margin:0 auto;
  }
  .topbar button{
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;
    font-family:inherit;
  }
  .topbar button:hover{border-color:var(--accent);color:var(--accent);}
  .topbar .spacer{flex:1;}
  .topbar .grp{display:flex;gap:4px;}
  .topbar .grp button.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .cover{padding:56px 0 26px;}
  .cover .eyebrow{ font-size:14px;color:var(--accent);font-weight:700;margin-bottom:14px; }
  .cover h1{ font-weight:900;font-size:34px;line-height:1.35;margin:0 0 18px;letter-spacing:-0.01em; }
  .cover .desc{color:var(--sub);font-style:italic;font-size:16px;line-height:1.6;margin:0 0 22px;}
  .cover .tags{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:28px;font-size:13px;color:var(--sub);}
  .cover hr{border:none;border-top:1px solid var(--line);margin:26px 0;}
  .section-label{color:var(--accent);font-size:13px;font-weight:700;margin-bottom:14px;}

  .intro-card{
    background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    padding:22px 24px;margin-bottom:34px;cursor:pointer;
  }
  .intro-card .k{color:var(--sub);font-size:13px;margin-bottom:8px;}
  .intro-card .t{font-weight:800;font-size:19px;margin-bottom:14px;}
  .intro-card .go{color:var(--sub);font-size:13px;}

  .part-label{color:var(--accent);font-weight:700;font-size:15px;margin:34px 0 14px;}

  .toc-card{
    background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    padding:22px 24px;margin-bottom:16px;cursor:pointer;
  }
  .toc-card .num{color:var(--accent);font-weight:800;font-size:14px;margin-bottom:8px;}
  .toc-card .t{font-weight:800;font-size:19px;line-height:1.4;margin-bottom:10px;}
  .toc-card .s{color:var(--sub);font-style:italic;font-size:13.5px;line-height:1.5;margin-bottom:16px;}
  .toc-card hr{border:none;border-top:1px solid var(--line);margin:0 0 12px;}
  .toc-card .go{color:var(--sub);font-size:13px;}
  .toc-card:hover{box-shadow:0 4px 18px rgba(20,20,25,0.10);}
  .toc-card:hover .t{color:var(--accent);}

  .ch-meta{color:var(--sub);font-size:13px;margin:26px 0 4px;}
  .ch-title{font-size:27px;font-weight:800;line-height:1.4;margin:6px 0 10px;}
  .ch-sub{color:var(--accent);font-size:15px;font-style:italic;margin-bottom:26px;}
  .prose{font-size:17px;line-height:1.95;}
  .prose p{margin:0 0 1.3em;}
  .prose h3{
    font-size:19.5px;font-weight:800;margin:1.6em 0 0.7em;
    padding-bottom:8px;border-bottom:2px solid var(--accent);
    display:inline-block;
  }

  .summary-box{
    background:var(--card); box-shadow:var(--shadow); border-radius:16px;
    padding:20px 22px; margin:30px 0 14px;
  }
  .summary-box .lbl{font-size:12px;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:8px;}
  .summary-box p{font-size:15.5px;line-height:1.75;margin:0 0 10px;}
  .summary-box .note{font-size:13px;color:var(--sub);line-height:1.6;}

  .q-box{margin:26px 0;}
  .q-box .lbl{font-size:12px;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:10px;}
  .q-item{
    padding:14px 16px;background:var(--card);box-shadow:var(--shadow);
    border-radius:12px;margin-bottom:10px;font-size:15px;line-height:1.65;
  }

  .note-box{margin:30px 0;}
  .note-box .lbl{font-size:12px;letter-spacing:.1em;color:var(--sub);font-weight:700;margin-bottom:8px;}
  .note-box textarea{
    width:100%;min-height:110px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;color:var(--ink);font-family:inherit;
    font-size:14.5px;line-height:1.6;resize:vertical;box-shadow:var(--shadow);
  }
  .note-box .save-hint{font-size:12px;color:var(--sub);margin-top:6px;}

  .nav-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:40px;padding-top:20px;border-top:1px solid var(--line);
    font-size:14px;
  }
  .nav-row button{
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 16px;cursor:pointer;font-family:inherit;font-size:13.5px;
  }
  .nav-row button:disabled{opacity:.3;cursor:default;}
  .nav-row button:not(:disabled):hover{border-color:var(--accent);color:var(--accent);}
  .nav-row .toc-link{color:var(--sub);cursor:pointer;text-decoration:underline;}

  [data-fontsize="sm"] .prose{font-size:15px;}
  [data-fontsize="lg"] .prose{font-size:19.5px;}

  .hidden{display:none !important;}
  a{color:var(--accent);}
</style>
</head>
<body data-theme="light" data-serif="on" data-fontsize="md">
<div class="topbar">
  <button id="btnToc">목차 보기</button>
  <div class="spacer"></div>
  <button id="btnSerif">명조체</button>
  <div class="grp"><button id="fs-sm">가-</button><button id="fs-lg">가+</button></div>
  <div class="grp">
    <button data-theme-btn="light" class="active">라이트</button>
    <button data-theme-btn="sepia">세피아</button>
    <button data-theme-btn="dark">다크</button>
  </div>
</div>

<div class="app">
  <div id="view-cover">
    <div class="cover">
      <div class="eyebrow">무기와 기술로 다시 읽는 조선 500년</div>
      <h1>우리가 알지 못했던<br>조선 전쟁사</h1>
      <div class="desc">상식을 뒤엎는 25장면 · 전 25화 수록본</div>
      <div class="tags"><span>무삭제 전문 수록</span>&nbsp;·&nbsp;<span>역사동아리 발제 및 토론 기록장</span>&nbsp;·&nbsp;<span>브라우저 자동 저장</span></div>
      <hr>
      <div class="section-label">도입글</div>
      <div class="intro-card" id="introCard">
        <div class="k">이 책을 읽는 규칙</div>
        <div class="t">강함을 만드는 것과 지키는 것은 다르다</div>
        <div class="go">읽기 시작 →</div>
      </div>
      <div id="tocInline"></div>
    </div>
  </div>

  <div id="view-chapter" class="hidden"></div>
</div>

<script>
const CHAPTERS = [{"part": "서문", "title": "강함을 만드는 것과 지키는 것은 다르다", "subtitle": "조선은 왜 매번 준비되지 않은 채로 전쟁을 맞았나", "body": "조선이 무기를 몰라서 매번 당했다고 생각하면, 이 책 절반은 못 읽는 셈이야.\n\n세계 최초의 2단 로켓을 설계한 나라, 진주성에서 3800명으로 3만을 막아낸 나라, 12척으로 133척을 상대한 나라. 기술도 있었고 사람도 있었어. 근데 이 나라는 그 힘이 손에 들어올 때마다 이상한 짓을 해. 만든 무기를 창고에 처박고, 이긴 장수를 의심하고, 강한 군대를 자기 손으로 해체해. 화약이 없어서 진 게 아니라, 화약을 가둬놓고 잊어버려서 못 쓴 거야.\n\n이 패턴, 처음 한두 번이면 우연이야. 근데 이성계부터 명성황후까지 500년 내내 똑같은 모양으로 반복돼. 그러면 이건 우연이 아니라 설계야. 조선이라는 나라 자체가 '강함'을 얻는 순간마다 그 강함을 의심하도록 짜여 있었던 거지.\n\n그래서 이 책은 \"조선이 얼마나 못났나\"를 보여주는 책이 아니야. 강함을 만드는 것과 그 강함을 계속 쥐고 있는 것, 이 둘이 완전히 다른 능력이라는 걸 보여주는 책이야. 그리고 이 질문은 나라에만 해당하지 않아. 한 사람이, 한 조직이 어렵게 얻은 힘을 스스로 놓아버리는 순간에도 똑같은 구조가 숨어 있어.\n\n한 가지만 미리 말해둘게. 여기 나온 이야기의 절반은 사료로 확정된 사실이고, 절반은 그 사이를 메운 해석이야. 각 화 끝에 ※ 표시로 어디까지가 사실이고 어디부터가 추론인지 구분해뒀어. 그 해석에 동의 안 해도 괜찮아 — 오히려 반박거리를 찾아내는 게 이 책을 제대로 읽는 방법이야.\n\n1화부터 시작해보자. 조선을 세운 힘이, 사실 조선의 것이 아니었다는 이야기부터.", "summary": "", "note": "", "questions": []}, {"part": "1부", "title": "이성계, 조선을 만든 여진족 사병", "subtitle": "고려가 한 번도 만들지 못한 군대", "body": "'이성계와 위화도 회군.' 모르는 사람 없지? 요동 정벌 가던 군대를 돌려세워서 새 나라를 세웠다는, 한국사 최대급 쿠데타. 근데 진짜 궁금한 건 그 다음이야. 그 많은 고려 무장 중에 왜 하필 이성계였을까. 최영도 있었고, 더 좋은 가문 출신도 수두룩했는데.\n\n답부터 말하면 — 이성계는 '고려 군대'를 가진 게 아니었어. 고려가 단 한 번도 가져본 적 없는 종류의 군대를 가지고 있었던 거야.\n\n승승장구의 스펙을 한번 보자\n이성계 '커리어'를 쭉 나열해보면 패배가 거의 없어. 1362년 나하추(원나라 잔존 세력) 격파, 1370년 동녕부 정벌, 1376~1380년 왜구 토벌, 그리고 황산대첩(1380)에서는 '나이 어린 적장' 아지발도를 활로 쏴 죽이는 장면까지 기록에 남아. 이게 다 신묘한 개인기 한 번으로 되는 일이 아니야. 매번 이기려면 매번 동원할 수 있는 '내 군대'가 있어야 해.\n\n그 군대 이름이 가별초(家別抄)야. 국가가 편성한 정규군이 아니라, 이성계 집안이 수십 년간 길러온 사병집단. 그리고 이 부대의 핵심 전력이 여진족 기병이었어. 변경에서 여진족이랑 같이 살고, 같이 사냥하고, 같이 싸우면서 만들어진 혼종 군대였던 거지.\n\n이성계는 사실 '고려인'이 아니라 '변경인'이었어\n여기서 한 발 더 들어가 보자. (이성계 가문의 정체성을 둘러싼 이 부분은 사료를 꿰어 맞춘 해석이야. 미리 말해둘게.)\n\n이성계의 고향 땅, 동북면(지금의 함경도)은 원래 고려 땅이 아니었어. 100년 가까이 원나라가 직접 다스린 쌍성총관부였지. 이성계의 할아버지, 아버지(이자춘)는 고려 사람이 아니라 원나라가 임명한 천호(千戶) 벼슬아치였어. 공민왕이 반원정책을 펴면서 쌍성총관부를 되찾을 때(1356), 그제야 이자춘 부자가 고려에 '귀부'해. 즉 이성계는 태어날 때부터 고려인이 아니라, 원나라 변경 군벌의 아들로 태어나서 나중에 고려에 합류한 사람인 거야.\n\n이거, 온달이랑 닮지 않았어? 둘 다 중앙에서 보면 '우리 쪽 사람'이 아니었어. 다만 온달은 '바보'라는 낙인이 붙었고, 이성계한테는 그런 낙인이 안 보여. 왜 차이가 날까?\n\n낙인이 안 붙은 이유 — 그가 가져온 게 너무 컸으니까\n온달과 처용 화에서 정리했던 공식 기억나? '괴물'이든 '바보'든, 낙인 뒤에는 그 사회가 사고 싶어했던 자원이 있다는 거. 처용은 의술 한 명분, 온달은 무력 한 명분을 가져왔고, 그 정도 크기는 '낙인 찍어서 길들인 다음 사들이는' 방식이 통했어.\n\n그런데 이성계가 가져온 건 장수 한 명의 무력이 아니야. 변경 전체의 군사 기반, 여진족과의 동맹망, 수십 년 쌓인 사병집단 전체야. 이 정도 크기는 낙인 찍어서 통제할 수 있는 범위를 이미 넘어. 그러니까 고려 중앙은 이성계를 '바보'나 '괴물'로 깎아내릴 수가 없었던 거지 — 깎아내리기엔 이미 너무 강했으니까. 대신 다른 방법을 썼어. 회유와 결혼, 그리고 벼슬.\n\n결국 위화도 회군(1388)이 일어났을 때, 이건 단순한 '명분 있는 쿠데타'가 아니라 — 변경의 군사력이 처음으로 중앙의 명령을 거부한 사건이야. \"작은 나라가 큰 나라를 거역할 수 없다\"는 4불가론, 명분으로는 그럴듯하지만, 더 근본적으로는 요동 정벌이 이성계 자신의 군사 기반(동북면 기마전력)을 명나라와의 소모전에 갈아 넣는 일이었기 때문 아닐까.\n\n그리고 권력을 잡은 다음엔, 어김없이 '기원 편집'이 들어가. 『용비어천가』는 이성계의 조상 4대를 거슬러 올라가 모두 왕으로 추존해. 변경 군벌의 아들이었던 출신을, 처음부터 '하늘이 점지한 왕가'였던 것처럼 다시 써버린 거야. 권력이 안정되면 기원을 편집한다 — 이것도 역사에서 계속 반복되는 패턴이지.\n\n가장 강력한 아이러니\n조선은 변방의, 비정규의, 혼종적인 군사력으로 세워진 나라야. 그런데 건국하자마자 정도전과 이방원은 사병혁파(1400)를 밀어붙여서 그 사적 군사기반을 전부 해체해버려. 자기를 강하게 만든 바로 그 힘의 종류를, 자기 손으로 무너뜨린 거지.\n\n이게 이 책 전체에서 계속 따라올 첫 번째 질문이야. 개인의 군사적 재능은 있는데, 그게 국가 시스템으로 제도화되지 못하고 매번 휘발되는 패턴. 이순신도, 훗날 비슷한 모양으로 반복돼.", "summary": "이성계의 승리는 '고려의 강함'이 아니라 '고려가 흡수하지 못한 변경의 강함'이었다. 그리고 그 강함이 너무 컸기에, 고려는 그를 낙인찍지 못하고 결국 그에게 먹혔다.", "note": "※ '낙인이 안 붙은 이유'와 '용비어천가 소급 편집'은 정황을 꿴 해석이지 확정된 사실이 아니야. 다만 가별초의 존재, 쌍성총관부 출신, 위화도 회군의 동기는 사료에 분명히 남아 있어.", "questions": ["온달은 결국 전쟁터에서 죽고 '온달 가문'을 못 남겼는데, 이성계는 왕조를 세웠어. 똑같이 '변경 무력의 중앙 진입'인데 왜 결과가 이렇게 다를까? (힌트 — 그때 중앙 권력이 건강했는지, 무너지고 있었는지를 비교해봐)", "조선은 자신을 만든 힘(사병, 변경 기마전력)을 스스로 해체했어. 이게 옳은 선택이었을까, 아니면 화근을 남긴 선택이었을까?", "지금 우리 사회에서도 '변방의 힘'이 중앙으로 흡수되는 사례가 있을까? (스타트업이 대기업에 인수되는 것도 비슷한 구조 아닐까?)"]}, {"part": "1부", "title": "177년 전에 사라진 거북선", "subtitle": "위협의 크기에 비례해서 켜지고 꺼지는 무기", "body": "'기해동정, 1419년 대마도 정벌.' 통쾌한 승전으로 배우잖아. 근데 날짜를 자세히 보면 이상한 게 하나 있어.\n\n세종은 1418년에 즉위했어. 그런데 1419년 대마도 정벌의 명령권은 전부 상왕 태종한테 있어. 왕은 세종인데 군대는 태종이 움직이는 거지. 1부 1화에서 본 거 기억나? 이성계는 사병혁파로 자기 힘의 원천을 스스로 해체했잖아. 근데 그 아들 태종은 정반대야. 왕위는 넘기되 군권만은 끝까지 손에서 안 놔. 권력을 나누는 게 아니라, 가장 위험한 부분만 따로 떼서 끝까지 쥐고 있는 거지.\n\n227척을 모을 수 있었던 이유\n이종무가 이끈 정벌군이 227척, 1만 7천 병력이야. 이게 갑자기 뚝딱 만들어진 군대가 아니야. 거슬러 올라가면 1380년 진포대첩까지 가. 최무선이 화포를 처음 함대에 단 그 전투에서, 고려 수군은 왜구 배 500척을 불태웠어. 그러니까 1419년 대마도 정벌은 고려 말부터 쌓아온 화포·수군 기술의 결과물인 거야.\n\n여기서 1화랑 연결되는 지점이 있어. 가별초(기병·사병)는 위험하다고 판단해서 해체했는데, 화포·수군은 왜 살아남았을까? 아마 답은 이거야 — 기병은 '개인에게 충성하는 군대'라 왕권에 위협이 됐고, 전함과 화포는 '국가만 만들 수 있는 인프라'라 위협이 안 됐던 거지. 그래서 한쪽은 끊기고 한쪽은 제도화됐어.\n\n177년 먼저 나타났다 사라진 배\n근데 이 수군의 역사에서 가장 이상한 사건이 하나 있어. 태종실록을 보면, 1413년 2월 태종이 임진나루를 지나다가 '거북선'과 왜선이 싸우는 모의 해전을 구경했다는 기록이 나와. 1415년엔 신하 탁신이 \"거북선의 법은 많은 적과 충돌해도 해를 입지 않으니 결승의 좋은 계책\"이라며 더 견고하게 만들자고 건의하기까지 해.\n\n이순신의 거북선보다 177년 빠른 기록이야. 근데 이 거북선, 여기서 뚝 끊겨. 이후 177년간 단 한 번도 실록에 안 나타나. 그러다가 1592년 이순신이 '창제(創製)' — 처음 만든 것처럼 — 다시 등장시켜. 마치 한 번도 없었던 것처럼.\n\n이걸 '조선은 좋은 기술을 까먹는 나라였다'로 읽으면 너무 쉬운 결론이야. 날짜를 맞춰보면 다른 그림이 나와.\n\n켜지고 꺼지는 무기\n일본은 1336년부터 남북조시대라는 내전 상태였어. 중앙정부(무로마치 막부)가 통제력을 잃으니까 규슈·대마도·이키섬 지방 호족들이 사략집단으로 변해서 한반도를 떼로 습격했어. 고려 말 왜구가 그렇게 컸던 이유야. 거북선처럼 '많은 적과 충돌해도 버티는' 돌격선이 필요했던 것도 이 시기 — 떼로 몰려와 배에 기어오르는 집단 백병전을 막아야 했으니까.\n\n근데 1392년, 정확히 조선이 건국된 그 해에 일본도 남북조를 통일해. 무로마치 막부가 자기 영내 해적을 단속하기 시작하면서 약 50년간 왜구 활동이 거의 잠잠해져 — 이 시기가 바로 태종~세종 때야. 1443년 계해약조로 조선은 대마도주한테 무역 특권(세견선 50척)까지 보장해주면서 회유책으로 완전히 돌아서.\n\n이제 상대는 떼로 몰려오는 정규군급 왜구가 아니라, 소수가 치고 빠지는 좀도둑 수준이야. 이런 상대한테 비싸고 무겁고 만들기 어려운 돌격선은 과잉 스펙이지. 가볍고 빠른 배로 쫓아가서 잡는 게 훨씬 효율적이야. 그러니까 거북선이 방치된 건 '깜빡한' 게 아니라, 위협이 줄어든 만큼 정확히 군비를 줄인 합리적 선택이었던 거야.\n\n그리고 1467년 오닌의 난으로 일본이 다시 전국시대(내전)에 빠지면서 왜구가 더 큰 규모로 돌아오고, 결국 1590년 도요토미 히데요시가 전국시대를 통일하면서 — 이번엔 해적이 아니라 국가 정규군이 바다를 건너와. 임진왜란이야. 177년 전에 버려졌던 바로 그 설계 사상, '집단 백병전을 막는 돌격선'이 다시 필요해지고, 이순신이 그걸 다시 만들어내.", "summary": "거북선이 사라진 건 기술을 잊어서가 아니라, 그 기술이 필요 없을 만큼 위협이 줄었기 때문이다. 조선의 무기는 잊혀진 게 아니라, 적의 크기에 정확히 비례해서 켜지고 꺼졌다.", "note": "※ '왕권 위협 여부가 사병혁파와 수군 존속을 갈랐다'는 부분은 정황을 꿴 해석이야. 다만 대마도 정벌의 시점, 거북선 기록의 공백, 일본 내전 주기와의 일치는 사료로 확인돼.", "questions": ["태종이 군권만 끝까지 쥐고 있었던 것, 이건 '안전장치'였을까 '권력 집착'이었을까? 둘을 가르는 기준이 있을까?", "무기를 '필요할 때만 켜고 끄는' 전략은 합리적이지만, 177년 후 갑자기 다시 켜야 했을 때는 준비 안 된 상태로 전쟁을 맞이하게 돼. 효율과 대비, 이 둘은 같이 갈 수 없는 걸까?", "지금 우리나라(혹은 다른 나라)의 국방 예산도 '위협의 크기'에 따라 켜지고 꺼지고 있을까? 아니면 항상 일정하게 유지될까?"]}, {"part": "1부", "title": "세계 최초 2단 로켓, 그러나 화약이 없었다", "subtitle": "세계 최초의 로켓을 만든 나라가 왜 끝내 화약을 자급 못 했을까", "body": "3화에서 본 염초 부족, 그게 단순히 '원료가 모자랐다'는 얘기로 끝나면 너무 평범해. 진짜 충격적인 건 따로 있어 — 그 부족한 원료로 조선이 만든 무기가 사실 당대 세계 최고 수준이었다는 거야.\n\n세계 최초의 2단 로켓\n세종 27년(1445), 세종은 그동안의 화약무기 개발 성과를 직접 발표해. 이때 확정된 화약무기가 총 23종 — 총포류 10종, 폭탄류 8종, 로켓화기 5종이야. 3년 뒤인 1448년엔 이걸 전부 그림과 규격으로 정리한 『총통등록』을 펴내는데, 세종은 이 책을 \"절대 아전의 손에 들어가지 않게 하라\"고 못 박아. 국가 1급 기밀이었던 거야.\n\n이때 군기감정으로 발탁된 39세의 과학자 박강이 개발한 게 대신기전이야. 사정거리 최대 2km, 설계도엔 0.1mm 단위까지 정밀하게 규격이 적혀 있어. 항공우주연구원 채연석 박사는 이걸 \"세계 최초의 2단형 로켓\"이라고 평가해. 그러니까 조선은 15세기에 이미 다단 로켓 추진 개념을 실현한 나라였던 거지.\n\n그리고 세종의 아들 문종. 왕세자 시절부터 동생들이랑 같이 화약무기 연구를 도왔던 이 사람은, 왕이 된 1451년에 직접 화차를 설계해. 바퀴축 위에 기둥을 세워서 신기전 발사각을 20도에서 40도까지 끌어올리는 구조인데, 이 설계 하나로 사거리가 1.5배 늘어나. 채연석 박사 표현을 빌리면 \"세계 역사상 흔하지 않게 왕이 직접 발명하고 대량으로 제작해서 사용한 무기\"야. 조선은 이 화차를 전국에 700여 기나 배치했어.\n\n근데 이 위력적인 무기에 나무위키조차 이렇게 평가를 달아놔: \"위력은 강했지만 연비가 나쁜 무기.\" 대신기전 한 발에 들어가는 화약량이 천자총통의 3배가 넘었던 거, 3화에서 본 그 얘기로 다시 돌아오는 거야.\n\n기술은 정점을 찍었는데, 정작 그 기술이 가장 많이 먹는 게 만성 적자 상태인 염초였어. 세종은 비행거리, 정밀도, 발사각까지 0.1mm 단위로 계산할 수 있는 나라를 만들어놓고, 정작 그 무기를 계속 쏠 연료는 화장실 바닥과 오래된 흙담을 긁어모아서 만들어야 했던 거야.\n\n두 번째 단절 — 사람\n근데 염초만 문제가 아니었어. 더 결정적인 단절이 하나 더 있어.\n\n문종은 딱 2년 3개월 왕위에 있다가 죽어. 세자 시절부터 30년 가까이 화약무기 연구에 매진했던 사람이, 정작 왕이 돼서 그 지식을 정책으로 펼칠 시간을 거의 못 받은 거지. 채연석 박사는 이렇게 말해 — \"문종이 세종처럼 30년 이상 통치했다면 우리나라 판도가 달라졌을 것.\"\n\n이게 1화에서 본 패턴이랑 똑같아. 이성계의 군사적 재능이 제도로 안 남고 한 세대로 끝났듯이, 세종-문종 2대에 걸쳐 쌓인 화약무기 노하우도 문종의 요절로 정점을 찍자마자 꺾여. 기술 자체가 사라진 건 아니지만, 그걸 다음 단계로 밀어붙일 사람이 너무 일찍 사라진 거야.\n\n1부를 닫으며 — 같은 모양의 결핍, 세 번째\n1화: 이성계는 자기를 강하게 만든 힘(가별초)을 스스로 해체했다.\n2화: 거북선은 위협이 줄자 177년간 방치됐다 — 제도는 안 끊겼지만 발명은 끊겼다.\n3화: 조선은 자기를 만든 인적 뿌리(여진과의 유대)를 끊어냈고, 그 정벌을 수행한 무기의 원료(염초)는 끝내 자급하지 못했다.\n4화: 세계 최고 수준의 화약무기 기술이 있었지만, 그걸 계속 굴릴 원료도 없었고, 그걸 이어갈 사람도 너무 빨리 사라졌다.\n\n네 화를 관통하는 한 문장은 이거야 — 조선은 강함을 만드는 데는 매번 성공했지만, 그 강함을 지속시키는 데는 매번 실패했다. 사람이든 기술이든 원료든, 한 세대 안에서는 정점을 찍는데 그 정점이 다음 세대로 안 넘어가. 이 패턴이 정확히 150년 뒤, 임진왜란이라는 형태로 청구서가 날아와.", "summary": "조선은 세계 최초의 2단 로켓을 설계할 만큼 뛰어난 화약무기 기술을 가졌지만, 그 무기를 계속 쏠 염초도, 그 기술을 이어갈 사람(문종)도 충분히 갖지 못했다. 기술의 문제가 아니라 지속가능성의 문제였다.", "note": "※ '문종이 더 오래 살았다면 달라졌을 것'은 채연석 박사의 가정적 평가야. 다만 대신기전의 사거리·정밀도, 문종화차의 설계 원리, 문종의 재위 기간은 사료와 복원 연구로 확인돼.", "questions": ["세종-문종 부자처럼, 한 분야에 깊이 매진한 리더가 너무 일찍 사라지면서 그 흐름이 끊긴 다른 역사적 사례를 찾을 수 있을까?", "'위력은 강하지만 연비가 나쁜 무기'라는 평가, 지금 우리가 쓰는 어떤 기술에도 적용할 수 있지 않을까? (비싸고 강력하지만 유지비가 감당 안 되는 것들)", "기술 개발과 자원 확보, 인재 양성 — 이 세 가지 중 하나라도 빠지면 결국 무너진다는 게 1부 전체의 결론인데, 지금 우리나라(혹은 우리 학교, 우리 동아리)에 적용해보면 어디가 제일 약할까?"]}, {"part": "1부", "title": "쿠데타로 왕이 된 자가 화약을 두려워한 이유", "subtitle": "찬탈자가 화약을 가두고, 위협은 마침 사라진 것처럼 보였다", "body": "1453년 계유정난. 수양대군(훗날 세조)이 정적들을 숙청하고 권력을 잡는데, 이때 죽은 사람 중 한 명이 김종서야. 맞아, 3화에서 6진을 개척한 그 김종서. 동맹가첩목아의 땅을 정벌하고 조선의 북방 국경을 그어낸 사람이, 정작 조선 내부 권력투쟁에서 가장 먼저 제거돼.\n\n문종이 2년 3개월 만에 죽고(1452), 어린 단종이 즉위하자 숙부인 수양대군이 김종서와 황보인 같은 고명대신들을 죽이고 실권을 장악해. 2년 뒤엔 아예 단종을 끌어내리고 자기가 왕이 되지. 4화 끝에서 던진 질문 — \"문종이 더 오래 살았다면 어떻게 됐을까\" — 의 답이 사실 여기 있어. 문종이 일찍 죽은 게 그냥 불운이 아니라, 그 죽음이 곧바로 권력 공백과 찬탈로 이어진 거야.\n\n찬탈자가 가장 무서워하는 것\n여기서 1화 패턴이 다시 나와. 세조는 무력으로 왕위를 빼앗은 사람이야. 정통성이 없어. 그러면 이런 사람한테 가장 무서운 게 뭘까 — 자기처럼 무력으로 권력을 빼앗을 수 있는 또 다른 누군가야.\n\n그래서 실제로 무슨 일이 있었냐면, 화약무기 연구를 정리한 백과사전 기록에 이런 구절이 있어. \"화기 발달에 대한 관심은 권력집중에 힘을 기울였던 조선 태조와 세조에 의하여 위험시되어 억압되었다.\" 태조 이성계랑 세조가 한 묶음으로 나와. 이성계는 사병을 혁파하고 화약을 명절 불꽃놀이용으로만 묶어뒀던 사람이지. 세조도 똑같은 본능을 보인 거야 — 백성한테 화약 기술이 퍼지면, 그건 또 다른 누군가의 쿠데타 무기가 될 수 있으니까.\n\n세종-문종이 23종의 화약무기를 만들고 700기의 화차를 전국에 깔았던 그 황금기가, 문종이 죽고 채 5년도 안 돼서 찬탈자의 손에 다시 가둬진 거야. 기술이 사라진 게 아니라, 그 기술을 더 퍼뜨리고 발전시킬 동력이 정치적으로 차단된 거지.\n\n같은 해에 위협이 두 개나 사라진 것처럼 보였다\n근데 여기서 타이밍이 기가 막혀. 세조 13년, 즉 1467년 한 해에 이런 일이 동시에 일어나.\n\n하나, 남이가 건주위로 쳐들어가서 추장 이만주 부자를 참살해. 3화에서 본 그 정벌이야. 조선을 오래 괴롭히던 여진 세력의 핵심이 한 방에 꺾인 거지.\n\n둘, 일본에서 오닌의 난이 터지면서 전국시대가 시작돼. 무로마치 막부의 통제력이 완전히 무너지고 다이묘들끼리 싸우기 시작해. 2화에서 본 거 기억나? 일본이 내전에 빠지면 외부로 나갈 여력이 없어 보이거든. 당장은.\n\n그러니까 1467년의 조선 조정 입장에서 보면, 북쪽 여진은 핵심 세력이 박멸됐고 남쪽 일본은 자기들끼리 싸우느라 정신이 없어. 두 개의 위협이 같은 해에 동시에 사라진 것처럼 보이는 거야. 게다가 이 모든 일을 지휘한 게 다름 아닌 세조 자신이지 — 외부 안보의 영웅이자, 동시에 내부 화약기술의 억압자.\n\n근데 이게 착시였다는 거, 2화에서 이미 봤지. 일본의 내전(전국시대)은 위협이 사라진 게 아니라 더 큰 위협으로 응축되는 과정이었어. 후기 왜구는 전기보다 더 커졌고, 결국 도요토미 히데요시가 그 내전을 통일하면서 국가 규모의 침공군이 만들어져. 1467년의 안도감은 사실 임진왜란이라는 청구서가 발행되는 순간이었던 거야.\n\n가장 위험한 순간은 가장 안전해 보일 때 온다\n정리해보면 이런 그림이 나와. 안에서는 권력을 찬탈한 왕이 분산된 화약 기술을 의도적으로 가두고 있고, 밖에서는 두 위협(여진, 일본)이 마침 같은 해에 사라진 것처럼 보여. 내부 동기와 외부 착시가 동시에 같은 방향을 가리키는 거지 — \"이제 군비에 힘 뺄 때 아니다.\"\n\n그런데 정확히 이 순간이, 4화에서 본 세계 최고 수준의 화약무기 기술이 다음 단계로 발전하지 못하고 멈춘 지점이야. 그리고 2화에서 본 거북선이 177년간 잊혀지기 시작한 것도 바로 이 시기와 겹쳐. 권력이 안정을 원할 때, 그리고 위협이 줄어든 것처럼 보일 때 — 군비는 정확히 그 순간에 꺼진다. 근데 위협은 줄어든 게 아니라 형태를 바꿔서 자라고 있었어.\n\n1부 전체를 관통하는 마지막 문장은 이거야. 조선이 가장 무방비해진 순간은 위기의 순간이 아니라, 모든 게 안정된 것처럼 보이던 순간이었다.", "summary": "세조는 무력으로 왕위를 찬탈한 사람답게 분산된 화약 기술을 억압했고, 마침 같은 시기에 여진과 일본의 위협이 동시에 잦아든 것처럼 보였다. 그러나 일본의 위협은 사라진 게 아니라 전국시대라는 형태로 응축되고 있었다. 조선의 군비는 가장 안전해 보이던 바로 그 순간 꺼졌다.", "note": "※ 세조의 화기 억압과 권력집중의 인과관계는 사료가 명시한 평가이고, 1467년에 건주위 정벌과 오닌의 난이 같은 해에 일어났다는 것도 확인되는 사실이야. 다만 '조선 조정이 이 두 사건을 안도감으로 받아들였다'는 부분은 정황을 꿴 해석이야.", "questions": ["권력을 무력으로 잡은 사람이 그 무력의 원천(여기선 화약기술)을 가장 먼저 의심하고 통제한다는 것, 이게 세조랑 이성계 말고 다른 역사적 권력자한테도 적용될 수 있을까?", "'위협이 사라진 것처럼 보이는 순간'과 '실제로 위협이 사라진 순간'을 구별하는 게 왜 이렇게 어려울까? 지금 우리도 비슷한 착시에 빠질 수 있을까?", "김종서는 조선의 국경을 넓힌 영웅이면서 동시에 권력투쟁의 첫 희생자였어. 한 사람을 '영웅'과 '제거 대상'으로 동시에 만드는 게 권력의 어떤 속성일까?"]}, {"part": "1부", "title": "200년 뒤 청나라가 될 그 부족", "subtitle": "뿌리를 자르는 나라, 그리고 화약은 있는데 화약이 없었다", "body": "1화에서 본 거 기억나? 이성계를 승승장구하게 만든 가별초, 그 핵심에 이지란이라는 인물이 있었어. 근데 이지란이 누구냐면 — 본래 성이 퉁(佟)인 여진족 천호의 아들이야. 황산대첩에서 이성계랑 같이 아지발도를 잡은 그 활약, 사실 절반은 여진족 무사의 솜씨였던 거지.\n\n근데 1433년, 세종이 김종서를 보내 6진을 개척할 때 친 땅이 어디였을까. 정확히 여진족 동맹가첩목아가 다스리던 두만강 유역, 그중에서도 회령은 본래 여진의 근거지였던 알목하 지역이었어. 동맹가첩목아 부자가 죽자 그 자리를 세종이 차지한 거야.\n\n조선을 세운 피와 조선을 끝장낼 피\n여기서 소름 돋는 연결이 하나 나와. 동맹가첩목아가 이끌던 오도리족, 명나라가 '건주좌위'로 따로 묶어둔 이 부족 계통에서 약 150년 뒤 청나라를 세우는 누르하치가 나와. 그러니까 세종이 6진을 세우려고 밀어낸 바로 그 부족 계통이, 훗날 조선을 무릎 꿇리는 청 황실의 뿌리인 거야.\n\n(이지란이랑 동맹가첩목아가 직접 친척이라는 얘기도 일부 자료에 있긴 한데, 이건 확정된 사실이 아니라 정황 추정이야. 다만 둘 다 같은 동북면-건주여진 인적 풀에서 나왔다는 건 분명해.)\n\n이게 끝이 아니야. 1467년, 남이가 이끈 건주위 정벌도 같은 패턴이야. 이때 벤 건주위 추장 이만주는 압록강 유역 서여진이랑 두만강 유역 오도리족을 함께 통솔했던 인물이거든. 변경의 무력을 흡수해서 나라를 세운 지 두 세대 만에, 조선은 그 무력의 뿌리를 정조준해서 베어내고 있었던 거지.\n\n왜 굳이 그 뿌리를 끊어냈을까\n세 가지 힘이 같이 작동했다고 봐.\n\n첫째, 유대는 인물 단위였지 제도가 아니었어. 이지란이 이성계를 형님으로 모신 건 이성계 개인에 대한 충성이지 '조선'에 대한 충성이 아니야. 이지란이 1402년에 죽고, 권력의 중심이 동북면에서 한양으로 옮겨가니까 그 유대를 이을 다음 세대가 없었어. 6진 개척이 1433년이면 이성계 사후 거의 30년, 이지란 사후 30년이야. 두 세대 지나면 \"저긴 우리 우방의 땅\"이라는 기억보다 \"저긴 차지해야 할 빈 땅\"이라는 행정적 판단이 앞서. 개인적 동맹은 세습이 안 돼. 영토는 세습되지.\n\n둘째, 사대주의가 요구한 순혈 서사야. 조선은 명나라한테 '중화 문명을 받든 유교국가'로 인정받아야 사는 나라였어. 근데 건국자가 사실 여진족과 뒤섞인 변경 군벌이었다는 게 그대로 남아 있으면 정통성 서사가 흔들려. 그래서 기원은 용비어천가로 미화하고, 살아있는 증거(여진과의 현재진행형 관계)는 정리해야 했던 거야. 죽은 과거는 편집할 수 있지만, 살아있는 인척 관계는 끊어내야만 편집이 완성돼.\n\n셋째, 가장 현실적인 이유 — 땅이 필요했어. 4군6진은 단순 정벌이 아니라 사민정책, 그러니까 삼남 지방 백성을 강제 이주시켜 그 자리에 심는 정책이랑 한 세트였어. 국가가 인구를 늘리고 영토를 고정하려면 그 자리에 살던 여진족은 '우리 편이었던 이웃'이 아니라 '비워야 할 땅의 점유자'가 돼. 관계가 아니라 좌표로 보기 시작하는 거지.\n\n화약은 있는데 화약이 없었다\n근데 이 정벌을 가능케 한 무기 쪽도 똑같이 구멍이 있었어. 화약의 3요소(염초·유황·목탄) 중 가장 까다로운 게 염초인데, 최무선이 익힌 비법의 핵심도 사실 화기 주조가 아니라 이 염초를 굽는 기술이었어. 세종 즉위년(1418) 기록을 보면 군기감의 염초 보유량은 3,316근인데 1년 소비량은 약 8,000근. 만성 적자야.\n\n세종은 이걸 메우려고 박은의 건의로 염초토 채취처를 공공건물로 제한하고, 세종 13년(1431)엔 전국 단위로 도별 염초 생산량까지 할당했어. 그런데도 모자랐어. 신기전 같은 로켓 병기는 화약 소모량이 천자총통의 3배가 넘었거든. 화약을 전량 자체 생산해야 하는 조선군한테 신기전 한 발은 엄청난 사치였던 거야. 이 결핍은 끝내 안 풀려서, 선조 28년(1595)에야 군관 임몽이 바닷물로 염초 만드는 신기법을 국산화해. 임진왜란 한복판에서, 200년 가까이 끌어온 문제를 그제서야 푼 거지.\n\n같은 모양의 결핍이 두 개\n조선은 자기를 만든 인적 뿌리(여진과의 혼종성)를 정벌로 끊어내는 동시에, 그 정벌을 수행할 무기의 화학적 뿌리(염초)는 끝내 자급하지 못한 채 200년을 버텼어. 1화에서 봤던 것도 똑같은 그림이지 — 이성계는 자기를 강하게 만든 힘(가별초, 사병)을 스스로 해체했고, 화약무기조차 처음엔 백성한테 대중화되면 권력 집중에 장애가 된다며 명절 불꽃놀이용으로만 묶어뒀어. 사람이든 기술이든, 탈중앙적이고 개인 충성에 기반한 힘은 일단 의심하고 가둔다 — 이게 조선 초기 권력의 일관된 본능이었던 거야.\n\n그런데 그렇게 잘라낸 것들이 다음 위협으로 정확히 되돌아와. 베어냈던 그 여진의 후예가 정묘·병자호란으로 쳐들어오는데, 화약은 여전히 부족한 채로.", "summary": "조선은 자신을 만든 두 가지 기반 — 변경 민족과의 인적 유대, 그리고 화약의 원료인 염초 — 을 둘 다 완전히 자기 것으로 만들지 못한 채 국가를 운영했다. 끊어낸 뿌리와 채우지 못한 원료, 이 두 결핍이 200년 뒤 같은 시기에 한꺼번에 터진다.", "note": "※ '이지란과 동맹가첩목아의 친척 관계'는 정황을 꿴 추정이지 확정된 사실이 아니야. 다만 6진 개척의 대상지, 동맹가첩목아 계통과 누르하치의 연결, 염초 보유량과 소비량의 격차는 사료로 확인돼.", "questions": ["이지란은 죽기 전 \"본토(여진)의 풍속대로 화장해서 장사지내 달라\"고 부탁했대. 조선의 1등 개국공신이 왜 마지막 순간엔 자기를 조선인이 아니라 여진인으로 묻어달라고 했을까?", "국가가 '순혈 서사'를 만들기 위해 살아있는 관계를 끊어내는 일, 지금도 비슷한 사례가 있을까?", "좋은 무기를 설계하는 기술과, 그 무기를 계속 쓸 수 있게 원료를 자급하는 기술. 둘 중 하나만 있으면 결국 어떻게 될까?"]}, {"part": "2부", "title": "노부나가는 조총을 발명하지 않았다", "subtitle": "조총을 발명한 게 아니라 독점한 사람이 이겼다", "body": "임진왜란을 이해하려면 1592년이 아니라 그보다 훨씬 전, 일본 열도 안에서 벌어진 통일전쟁부터 봐야 해. 그리고 그 전쟁의 핵심 무기를 들여다보면, 2부 전체의 첫 번째 반전이 나와.\n\n### 조총을 처음 알아본 건 노부나가가 아니었다\n\n1543년, 규슈 남쪽 다네가시마 섬에 포르투갈 상인이 탄 배가 표류하면서 조총이 일본에 처음 들어와. 근데 흥미로운 건, 오다 노부나가가 조총의 가치를 처음 알아채고 3단 사격이라는 천재적 전술을 발명했다는 통설, 이게 사실 나중에 만들어진 이야기라는 거야. 현재 학계 정설은 노부나가 이전부터 이미 조총이 여러 다이묘들 사이에서 주력 무기 중 하나였다는 거지. 그 유명한 나가시노 전투(1575)의 '3단 철포설'도 전투가 끝나고 한참 뒤에 쓰인 『신장기』에서 나온 이야기가 메이지 시대 공식 전사에 그대로 실리면서 통설로 굳어진 거야.\n\n그러면 노부나가가 진짜 잘한 건 뭘까. 발명이 아니라 독점이야. 노부나가는 사카이라는 무역항을 장악해서 화약 유통을 틀어쥐었고, 압도적인 경제력으로 다른 다이묘들과 비교가 안 되는 규모 — 수천 정 단위 — 의 조총 부대를 운용했어. 나가시노 전투에서 다케다 가문의 전설적인 기마대가 전멸당한 것도, 조총이라는 신무기 자체보다는 그 무기를 '남들보다 압도적으로 많이' 가진 게 승부를 갈랐던 거지.\n\n이거, 4화에서 본 세종-문종이랑 완전히 반대 그림이야. 조선은 세계 최초의 2단 로켓을 설계할 만큼 기술은 최고였는데, 그걸 계속 쏠 원료(염초)를 못 구했어. 노부나가는 그 반대야. 조총 자체는 이미 있던 흔한 무기였는데, 그걸 계속 살 돈과 유통망을 독점해서 물량으로 찍어눌렀어. 설계의 문제가 아니라 자원 장악력의 문제였다는 게, 이번엔 승리한 쪽에서 증명된 셈이지.\n\n### 죽은 자의 유업을 이은 원숭이\n\n노부나가는 통일을 눈앞에 두고 1582년 혼노지의 변으로 부하 아케치 미쓰히데의 배신에 목숨을 잃어. 그런데 그 유업을 이은 게, 놀랍게도 노부나가 밑에서 미천한 신분으로 시작한 도요토미 히데요시였어. 원래 이름은 기노시타 도키치로, 아버지는 아시가루(하급 보병) 출신 빈농. 노부나가가 원숭이라고 놀렸다는 그 사람이 주군의 복수를 명분 삼아 순식간에 권력을 장악하고, 1590년 오다와라 정벌로 마지막 저항 세력까지 꺾으면서 100년 넘게 이어진 전국시대를 끝내.\n\n### 무기를 거두고, 계급을 가른다\n\n근데 여기서 조선과 소름 돋게 닮은 장면이 하나 나와. 히데요시는 통일 직후 도수령(1588)을 내려서 백성들이 가진 무기를 몰수해. 병농분리, 즉 무사와 농민의 신분을 확실히 갈라놓는 정책이야. 이거 1부에서 본 이성계의 사병혁파, 세조의 화기 억압이랑 똑같은 본능 아니야? 통일한 권력자가 제일 먼저 하는 일이 분산된 무력을 회수하는 거.\n\n근데 결정적인 차이가 하나 있어. 조선은 거둬들인 무력을 그냥 가두고 재웠어. 히데요시는 거둬들인 무력(사무라이 계급)을 없애지 않고, 그 힘을 밖으로 돌릴 준비를 했어.\n\n### 땅이 없으니 밖으로 나가야 했다\n\n통일전쟁이 끝나면 논공행상을 해야 하는데, 일본 열도 안의 땅은 이미 다 나눠줬어. 계속 충성을 유지하려면 계속 상을 줘야 하는데, 상으로 줄 새 영토가 없는 거야. 그런데 히데요시의 침략 야심은 이미 1585년, 그러니까 규슈 정벌(1587)보다도 전부터 \"일본은 물론 중국까지 도모할 심산\"이라고 주변 사람들이 눈치챌 정도로 뚜렷했어. 국내 통일전쟁의 연장으로 대외 침략을 벌여서, 부하 무장들의 군공에 계속 땅과 명예로 보답해야 하는 구조였던 거지.\n\n그러니까 정리하면 이래. 노부나가는 무기를 독점해서 통일전쟁에서 이겼고, 히데요시는 그 무기와 병력을 넘겨받아 통일을 완성했어. 근데 통일이 끝나자마자, 그 넘쳐나는 군사력을 국내에 둘 곳이 없어졌어. 병농분리로 무사 계급을 확실히 분리해놨으니 그들을 그냥 놀릴 수도 없고, 논공행상할 땅도 없어. 남은 선택지는 하나야 — 밖으로 내보내는 것.\n\n### 1592년의 마주침\n\n1부에서 본 조선은 어땠지? 내부 쿠데타를 막으려고 300년 가까이 군비를 억누르고 가둬온 나라야. 그런데 지금 2부 1화에서 본 일본은 정반대야 — 100년 넘는 내전 속에서 조총이라는 신무기를 실전으로 단련하고, 그걸 자본력으로 물량화하고, 통일 후엔 그 힘을 밖으로 돌릴 수밖에 없는 구조까지 만들어놓은 나라야.\n\n한쪽은 억눌린 힘, 한쪽은 갈 곳을 잃고 넘쳐나는 힘. 이 두 나라가 1592년, 부산 앞바다에서 마주쳐.", "summary": "노부나가는 조총을 발명한 게 아니라 독점해서 전국시대를 평정했고, 히데요시는 통일 후 남아도는 군사력을 밖으로 돌릴 수밖에 없는 구조 속에서 조선을 택했다. 조선의 억눌린 무력과 일본의 갈 곳 없는 무력이 임진왜란에서 정면으로 부딪힌다.", "note": "※ '노부나가가 조총을 처음 발견했다'는 통설은 후대에 굳어진 이야기고, 실제 학계 평가는 다르다는 걸 밝혀둘게. 나가시노 전투의 승패 요인, 도수령과 병농분리, 히데요시의 대외 침략 야심이 1585년부터 드러났다는 점은 사료로 확인돼.", "questions": ["노부나가의 승리 요인이 '기술 혁신'이 아니라 '자본력을 통한 독점'이었다는 것, 지금 산업이나 기업 경쟁에서도 비슷한 사례를 찾을 수 있을까?", "조선과 일본 둘 다 통일 후 '분산된 무력을 회수'했는데, 조선은 가뒀고 일본은 밖으로 돌렸다. 이 차이를 만든 조건은 뭐였을까? (땅의 크기, 정치체제, 주변국과의 관계 등)", "'논공행상할 땅이 없어서 전쟁을 벌인다'는 구조, 역사에서 비슷한 다른 전쟁의 원인으로도 찾아볼 수 있을까?"]}, {"part": "2부", "title": "무적함대보다 6배 큰 전쟁, 임진왜란", "subtitle": "유럽과 비교하면 보이는 것", "body": "임진왜란을 한중일 삼국의 국지전 정도로 배우잖아. 근데 같은 시기 유럽과 숫자를 나란히 놓으면 완전히 다른 그림이 나와.\n\n### 스페인 무적함대보다 10배 큰 상륙작전\n\n1588년 스페인 무적함대, 유럽사에서 가장 유명한 군사작전 중 하나로 배우지. 근데 여기 동원된 전투 병력은 약 3만~5만 명이야. 그런데 1592년 히데요시가 조선으로 보낸 병력은 15만 명, 1597년 재침 때는 14만 명. 미국 역사학자 케네스 스워프는 이걸 \"그 시점까지 역사상 최대 규모의 해상 상륙작전 중 하나\"라고 평가하면서, 무적함대의 거의 10배 규모라고 지적해.\n\n여기에 명나라 참전 병력(최대 12만), 조선군과 의병(최대 10만 추정)까지 더하면 이 전쟁에 동원된 전체 병력은 30만 명을 훌쩍 넘어. 스워프는 아예 이렇게 말해 — \"동시대의 스페인 무적함대 전쟁이 약 5만 명 규모였던 데 비해, 이 전쟁은 30만 명을 넘었다. 16세기 세계에서 병력 규모로는 가장 큰 전쟁이었다.\"\n\n사망자 수도 100만 명을 넘는다는 추정이 있어. 유럽에서 이 정도 규모로 언급되는 전쟁이 프랑스 종교전쟁(1562~1598)이나, 조금 뒤에 벌어지는 30년 전쟁(1618~1648)이야. 임진왜란은 그 사이 어딘가에 낄 만한 참혹함과 규모를 가진 전쟁이었던 거지. 근데 서구 역사학에서는 이 전쟁이 거의 안 알려져 있어. 스워프는 이걸 \"동아시아 중심의 역사가 서구 학계에서 과소평가된 유럽 중심주의의 결과\"라고 지적해.\n\n### 왜 서구는 몰랐을까, 그리고 왜 우리는 국지전으로만 배웠을까\n\n이 전쟁에 참전한 나라만 봐도 일본, 조선, 명나라 — 그리고 간접적으로 여진족과 몽골까지 얽혀. 스워프는 이 전쟁을 아예 \"제1차 동아시아대전(the First Great East Asian War)\"이라고 이름 붙였어. 규모로 보나 참전국 수로 보나, 지역 전쟁이 아니라 그 시대 동아시아 국제질서 전체를 건 전면전이었다는 거야.\n\n그런데도 우리는 이걸 '조선과 일본의 7년 전쟁' 정도로 축소해서 배워. 명나라 참전이라는 국제전적 성격, 그리고 무엇보다 이 전쟁이 같은 시기 지구 반대편 유럽 전쟁들과 비교해도 최대급 규모였다는 사실은 잘 안 다뤄지지. 이것도 일종의 역사 서술의 비대칭이야 — 유럽 전쟁은 '세계사'로, 동아시아 전쟁은 '지역사'로 나뉘는 시선.\n\n### 무기 밀도로 봐도 세계 최선두\n\n병력 규모만이 아니야. 1부·2부 1화에서 계속 본 무기 얘기로 돌아가면, 벽제관 전투에 참전한 다치바나 무네시게 부대의 구성을 보면 조총병 350명, 창병 640명, 궁병 91명이야. 전체 전투원 중 3분의 1이 조총으로 무장한 거지. 이 정도 화기 밀도는 당시 세계 어느 군대와 비교해도 최상위권이야. 동북아역사재단 자료에서도 \"당시 일본군은 16세기 후반 전 세계에서 가장 강한 군사력을 지니고 있었다는 평가도 있다\"고 정리하고 있어.\n\n2부 1화에서 봤듯이 이 화력은 100년 넘는 전국시대의 실전 경험, 그리고 사카이 항구를 통한 화약 유통 독점이 만든 거야. 다시 말해 임진왜란 때 조선이 마주한 건 그냥 '이웃 나라 군대'가 아니라, 당대 지구상에서 가장 많은 실전 경험과 가장 높은 화기 밀도를 가진 군대였던 셈이지.\n\n### 왜 이 스케일을 알아야 할까\n\n1부에서 조선의 무기 억압과 인적 뿌리 절단을 봤고, 2부 1화에서 일본의 무기 독점과 통일 후 배출구 없는 군사력을 봤잖아. 이 두 흐름이 부딪힌 결과가, 규모로 보면 '지역 분쟁'이 아니라 16세기 지구에서 손꼽히는 대전쟁이었다는 거야. 조선이 마주한 위기의 크기를 제대로 가늠하려면, 이 전쟁을 한중일 삼국사가 아니라 세계사의 좌표 위에 놓고 볼 필요가 있어.", "summary": "임진왜란은 병력 규모로 보면 동시대 스페인 무적함대 전쟁의 6배가 넘고, 사망자는 100만 명을 넘어 유럽의 대규모 종교전쟁급에 맞먹는다. 서구 역사학자 케네스 스워프는 이를 \"제1차 동아시아대전\"이라 부르며 16세기 세계 최대 규모의 전쟁으로 평가한다. 조선이 맞선 상대는 지역의 이웃 나라가 아니라, 당대 세계 최고 수준의 화기 밀도와 실전 경험을 가진 군대였다.", "note": "※ 병력 수치(일본 15만/14만, 명군 최대 12만, 스페인 무적함대 3만~5만)와 \"제1차 동아시아대전\"이라는 명명은 케네스 스워프의 연구(2009, 2011)와 옥스퍼드 학술지 인용에 근거해. 다만 정확한 사상자 집계와 병력 수는 사료마다 편차가 있어 추정치로 이해하는 게 맞아.", "questions": ["임진왜란이 '동아시아 지역사'가 아니라 '세계사적 대전'으로 다뤄지지 않는 이유가 뭘까? 이게 순전히 규모의 문제일까, 아니면 역사 서술 권력의 문제일까?", "다치바나 부대의 조총병 비율(1/3)처럼, 구체적인 숫자 하나가 막연한 인상(\"일본군이 셌다\")을 완전히 다른 무게로 바꿔놓는 경험을 해본 적 있어?", "지금 우리가 '국지전'이라 부르는 분쟁 중에서도, 사실 세계사적 규모나 의미를 가진 사건이 있을까?"]}, {"part": "2부", "title": "신립은 왜 조령을 버렸을까", "subtitle": "제승방략이라는 이름의 함정", "body": "3화에서 니탕개의 난과 십만양병설 얘기했잖아. 근데 그 니탕개의 난에서 가장 빛났던 장수가 신립이야. 훈융진 전투에서 여진 기병 1만 명 포위망에 혼자 뛰어들어 추장을 활로 쏴 죽이고, 도주하는 적을 추격해 70명을 더 사살한 그 사람. 9년 뒤, 이 신립이 탄금대에서 조선 최악의 참패를 지휘하게 돼.\n\n### 매복은 아무나 할 수 있는 게 아니다\n\n흔히 \"신립이 조령의 험한 지형을 버리고 평원에서 싸운 게 패인\"이라고 하는데, 이건 신립이 처한 상황을 너무 쉽게 보는 이야기야. 조령에서 매복전을 하려면 병사들이 숨을 죽이고, 먹지 않고, 소리 내지 않고, 명령 없이는 움직이지 않아야 해. 이건 오랜 훈련과 부대에 대한 신뢰가 쌓여야 가능한 일이야. 근데 신립 휘하 병력의 상당수는 며칠 전 논밭에서 끌려온 농민이었어. 산속으로 흩어 보내는 순간 지휘관의 시야 밖으로 나가는데, 도망칠 길은 사방에 있고 그걸 쫓아갈 여력도 없어. 신립이 조령을 버린 건 전술적 무지가 아니라, 애초에 매복이라는 선택지를 쓸 병력 자체가 없었기 때문일 가능성이 커.\n\n그러면 진짜 물어야 할 질문은 \"신립은 왜 조령을 버렸나\"가 아니라 — \"신립은 왜 애초에 매복도 못 할 군대를 물려받았나\"야.\n\n### 제승방략, 진관체제가 무너진 자리에 세운 임시방편\n\n여기서 제승방략(制勝方略)이라는 제도를 봐야 해. 원래 조선은 세조 때부터 진관체제라는 방식을 썼어. 전국을 여러 진관으로 나눠서 각 지역이 평소에도 자체적으로 방어력을 갖추는 방식이야. 근데 16세기 들어 군역 대립제(돈 내고 군역을 빼는 관행)가 퍼지면서 이 진관체제가 병력 피폐와 지방관의 무성의로 사실상 껍데기만 남아. 을묘왜변(1555) 이후 조선은 이 무너진 체제 대신 제승방략이라는 새 방식을 도입해 — 유사시에 각 지역 병력을 한 지점에 집중시키고, 중앙에서 파견한 지휘관(경장)이 그 병력을 지휘하는 방식이야.\n\n문제는 이 제도가 성립하려면 한 가지 전제가 필요해. 지방 병력이 집결지에 모이고, 중앙 지휘관이 도착할 때까지 그 자리를 지키고 있어야 한다는 거야. 근데 임진왜란 때 일본군의 진격 속도가 이 전제를 완전히 무너뜨려.\n\n### 이일의 상주, 신립보다 먼저 무너진 전례\n\n신립보다 앞서 상주로 파견된 이일의 경우를 보면 이 제도의 진짜 문제가 드러나. 이일이 도성에서 데려간 병력은 겨우 60여 명. 원래 계획대로면 제승방략에 따라 대구에 모여 있어야 할 경상도 병력이 그를 기다리고 있어야 했어. 근데 일본군의 진격이 너무 빨라서, 대구에 모였던 병력은 지휘관이 도착하기도 전에 이미 흩어져 도망가 버렸어. 집결지를 상주로 옮겼는데 거기도 마찬가지, 이일이 도착했을 땐 이렇다 할 병력이 없었어. 상주판관 권길을 시켜 급하게 긁어모은 병력이 수백 명, 전부 농민이었고.\n\n한 연구자는 이 남방의 제승방략을 이렇게 평가해 — \"진관체제의 단점과 제승방략의 단점을 모두 갖춘 최악의 결과물.\" 지방은 이미 진관체제 시절부터 무력화돼 있었는데, 거기다 \"중앙 지휘관이 올 때까지 기다려야 한다\"는 제승방략의 요구까지 얹히니까, 최악의 조합이 된 거야. 유성룡은 훗날 이 문제를 두고 김수가 제승방략을 발령해서 병사들이 경장을 기다리다가 적이 먼저 도착해 다 흩어졌다고 맹렬히 비판해.\n\n### 신립은 이미 무너진 파이프라인의 끝에 있었다\n\n신립이 충주에 도착했을 때 물려받은 게 바로 이 상황이야. 이일의 상주가 이미 이 방식으로 무너졌고, 신립은 그다음 방어선에서 똑같은 조건 — 훈련도 안 되고 사기도 없는 급조 병력 — 을 그대로 이어받아. 매복을 할 정예병이 없으니 조령은 쓸 수가 없고, 남은 선택은 병력을 한곳에 모아 지휘관 눈앞에 두고 등 뒤에 강을 둬서 물리적으로 도망갈 곳을 없애는 것 — 배수진뿐이었어. 오합지졸을 그나마 하나의 군대처럼 움직이게 할 수 있는 사실상 유일한 방법이었던 거지.\n\n그러니까 탄금대의 결과를 신립 개인의 오판으로 몰아가는 건 정확하지 않아. 신립은 죽을 자리에서 죽은 거고, 진짜 패인은 제승방략이라는 이름의 임시방편 — 무너진 진관체제 위에 급하게 얹은, 병력 집결 시간을 절대적으로 요구하는 제도가 일본군의 진격 속도 앞에서 처음부터 작동 불가능했다는 것.\n\n### 일본에게는 낯설지 않은 그림\n\n여기서 2부 1화로 잠깐 돌아가보자. 나가시노 전투(1575) 기억나? 다케다 가문의 전설적인 기마대가 노부나가의 조총 화력 앞에 무너졌던 그 전투. 탄금대에서 벌어진 일이 사실 일본 입장에서는 그 전투의 반복이었어.\n\n고니시 유키나가는 중군을 지치고 약한 것처럼 위장해서 깃발을 내리고 천천히 진군시켜 신립의 기병을 유인했어. 신립의 기마대가 학익진을 펼치며 돌격해 들어오자, 미리 좌우로 매복시켜둔 소 요시토시의 좌군과 마쓰우라 시게노부의 우군이 양쪽에서 조여들며 조총 사격을 퍼부었지. 정면엔 유인책, 양옆엔 매복 화력 — 기병의 돌격 본능을 이용해서 화망 안으로 끌어들이는 이 구조는, 나가시노에서 조총 부대가 다케다 기병대를 상대했던 방식과 본질적으로 같아.\n\n일본군 입장에서 이건 완전히 새로운 전술이 아니었어. 100년 전국시대 동안 \"기병의 돌격력을 조총의 집중 화력과 매복으로 무력화한다\"는 문법을 이미 수도 없이 실전에서 검증한 상태였던 거야. 신립이 니탕개의 난에서 쌓은 경험이 그에게 유일한 전쟁 문법이었던 것처럼, 고니시에게도 나가시노 이후 정립된 이 전술이 이미 몸에 밴 문법이었던 거지. 다만 한쪽은 그 문법을 다시 쓸 기회조차 없이 무너진 시스템 위에서 싸웠고, 다른 한쪽은 같은 문법을 열 몇 번째 실전에서 반복하고 있었다는 차이가 있을 뿐이야.\n\n### 다시 1부로\n\n이건 1부에서 계속 봤던 그 패턴이야. 개인이 비난받는 자리에, 사실은 여러 세대에 걸쳐 누적된 제도적 결함이 있었다는 것. 사병혁파, 화기 억압, 염초 부족, 군역 대립제로 인한 진관체제 붕괴 — 이 모든 게 겹겹이 쌓여서, 신립이라는 개인에게 \"매복도 못 하고 배수진밖에 못 치는\" 군대를 쥐여준 거야. 신립은 그 무너진 시스템이 건넨 카드로 최선을 다했고, 그 카드는 애초에 이미 진 패였어.", "summary": "신립이 조령을 버린 건 무지가 아니라, 매복을 수행할 정예병 자체가 없었기 때문이야. 제승방략은 진관체제 붕괴 위에 급조된 제도로, 병력 집결 시간을 전제하는데 일본군의 진격 속도가 그 전제를 무너뜨렸어. 이일의 상주가 먼저 이 방식으로 무너졌고, 신립은 이미 실패가 예정된 시스템을 물려받아 배수진이라는 마지막 카드를 썼어.", "note": "※ 신립의 전략적 판단을 둘러싼 평가는 학계에서도 갈리지만, 제승방략의 구조적 한계와 이일의 상주 전투 붕괴 경위, 유성룡의 비판은 사료로 확인돼.", "questions": ["결과만 보고 지휘관 개인을 비난하는 것과, 그 지휘관이 물려받은 시스템의 한계를 함께 보는 것 — 역사적 평가에서 이 둘을 어떻게 균형 잡아야 할까?", "제승방략처럼 '이상적인 조건에서만 작동하는 제도'를 급하게 도입했다가 실전에서 무너지는 사례, 지금 우리 사회의 정책이나 시스템에서도 찾을 수 있을까?", "이일과 신립, 같은 방식으로 두 번이나 무너졌는데도 조선 조정은 왜 제승방략을 바로 바꾸지 못했을까?"]}, {"part": "2부", "title": "왕이 도망치자 일본이 당황한 이유", "subtitle": "고니시는 왜 그렇게 당황했을까", "body": "전쟁이 시작되고 보름 만에, 선조는 한양을 버려. 일본군이 성벽 근처에도 오기 전에 이미 도주를 결정한 거야. 4월 29일, 종친들이 궐문을 두드리며 통곡하자 선조는 \"가지 않고 마땅히 경들과 더불어 목숨을 바칠 것\"이라고 말해놓고, 바로 다음 날 궁인들을 소집해 궐문을 나서.\n\n### 고니시가 어이없어한 이유\n\n한양에 무혈입성한 고니시 유키나가는 이 광경을 보고 매우 어이없어했다고 해. 이유가 있어 — 센고쿠 시대 일본의 다이묘들에게 자신의 성은 무슨 일이 있어도 지켜야 하는 대상이었거든. 그런 사고방식으로는 왕이 성을 버리고 도망친 행동을 도저히 이해할 수 없었던 거야.\n\n일본의 전쟁 문법은 이래. 성이 함락되면 전투는 끝난 거야. 다이묘가 거기서 도망친다는 건 있을 수 없는 선택지고, 대신 할복해서 부하와 백성을 살리는 게 명예로운 길이야. 도망간 다이묘는 백성도 안 따라. 무사로서의 자격을 잃는 거지. 그러니까 성이 함락되거나 성주가 죽으면, 그 지역의 전쟁은 그걸로 끝이야 — 이게 100년 전국시대 동안 무수히 반복된 통일전쟁의 문법이었어.\n\n### 일본이 오해한 것\n\n이 문법대로라면, 일본군이 한양을 점령하고 왕이 도망친 그 순간 조선이라는 나라의 저항은 사실상 끝났어야 해. 성주가 사라졌으니까. 근데 조선은 안 끝났어.\n\n왜 안 끝났을까? 서장 기억나? 조선은 정도전이 설계한 사대부 관료제 국가야. 무신정권의 재발을 막으려고 무력을 유학자 관료 밑에 두고, 국가의 정통성을 왕 개인의 무사도적 명예가 아니라 유교적 천명과 관료기구에 분산시켜놓은 나라. 그러니까 왕이 의주까지 도망가도 조정이라는 관료 시스템은 여전히 작동했고, 지방마다 의병이 일어났고, 명나라에 원병을 요청하는 외교도 계속됐어. 왕 한 사람의 물리적 위치와 국가의 생존이 분리돼 있었던 거지.\n\n일본이 놓친 게 바로 이거야. 그들은 \"성주를 잡거나 굴복시키면 전쟁 끝\"이라는 자기 나라의 게임 규칙으로 조선을 읽었는데, 조선은 완전히 다른 규칙으로 돌아가는 나라였던 거야.\n\n### 아이러니 — 도망이 오히려 나라를 살렸다\n\n여기서 역설적인 평가 하나가 있어. 선조는 의주에서 아예 명나라 요동으로 망명하려고까지 했어. 실제로 명나라의 망명 허락까지 받았는데, 조선 대신들의 반대로 무산돼. 근데 만약 이게 성공해서 선조가 조선 땅을 완전히 떠났다면 어떻게 됐을까?\n\n이런 분석이 있어 — 왕이 아예 국경을 넘어 사라졌다면, 의병과 명나라 원군이 나설 명분이 크게 흐려졌을 거고, 일본 장수들 입장에선 조선 땅이 더 이상 '도요토미 때문에 어쩔 수 없이 침략한 남의 나라'가 아니라 '주인 없는 땅, 하사받을 수 있는 영지'로 보였을 거야. 그럼 다이묘가 되고 싶은 일본 장수들이 훨씬 더 치열하게 싸웠겠지. 실제로 전쟁 후반 일본군이 쌓은 왜성들을 조명연합군이 거의 함락시키지 못했을 정도로 일본군은 수성전에 강했으니까.\n\n그러니까 선조는 나라 안에서는 끊임없이 도망다녔지만, 결정적으로 국경만은 넘지 않았어. 이 아슬아슬한 균형이 — 의도한 전략이었다기보다 신하들의 반대로 어쩌다 지켜진 선이었지만 — 조선의 국가성을 형체 없이 흩어지지 않게 붙잡아준 마지막 끈이었던 거야.\n\n### 항왜, 다른 명예 체계가 만든 존재\n\n이 문화 차이를 보여주는 재밌는 증거가 하나 더 있어. 일본식 무사 명예 코드로는 패배는 할복으로 갚는 거지만, 조선은 항복한 일본 무사를 정반대로 대우해. 사야가라는 일본 장수는 조선에 투항해서 김충선이라는 이름을 하사받고 정2품 벼슬까지 올라. 당대 일본에서는 웬만한 다이묘도 오르기 힘든 자리야. 조선의 관료제는 '누구 밑에서 태어났는가'보다 '지금 누구에게 충성하는가'로 사람을 평가할 여지가 있었던 거지. 무사 가문의 명예에 목숨을 거는 나라에서 온 사람 입장에선, 이것도 상상하기 힘든 시스템이었을 거야.\n\n### 어긋난 두 게임\n\n정리하면 이래. 일본은 '성주의 명예와 성의 함락'으로 전쟁의 끝을 판단하는 나라에서 왔고, 조선은 '왕의 물리적 위치와 무관하게 지속되는 관료 국가'였어. 두 나라가 서로 다른 게임의 규칙으로 같은 전쟁을 치르고 있었던 거야. 그리고 이 어긋남이, 역설적으로 초반의 궤멸적 패배에도 불구하고 조선이 7년을 버틸 수 있었던 이유 중 하나가 됐어. 왕은 도망쳤지만 나라는 도망치지 않았던 거지.\n\n### 360년 전에 이미 있었던 선례\n\n사실 조선이 이런 방식으로 반응할 수 있었던 데는 더 오래된 문화적 기반이 있어. 1232년, 몽골이 침입하자 고려 무신정권의 최우는 왕(고종)을 설득해서 수도를 강화도로 옮겨. 몽골군이 수전에 약하다는 걸 이용한 전략이었지. 이 강화천도는 1270년 개경으로 돌아갈 때까지 39년이나 이어져.\n\n이 39년 동안 흥미로운 분업이 벌어져. 왕과 조정은 섬 안에서 비교적 안전하게 버티고, 정작 몽골군과 직접 싸운 건 육지의 백성들이었어. 처인성에서 김윤후가 이끄는 백성들이 몽골 장수 살리타를 활로 쏴 죽이고, 충주성에서도 김윤후가 \"신분 안 가리고 관직을 주겠다\"며 백성들을 모아 싸워. 최씨 정권은 강화도 방위에만 주력했을 뿐 본토의 다른 지역이 침략받는 것엔 별다른 대책을 마련하지 않았다는 비판도 있어. 그러니까 이것도 '왕실은 섬에서 버티고, 나라의 실질적 저항은 백성들이 육지에서 담당하는' 구조였던 거야.\n\n게다가 1270년 개경 환도가 결정되자, 이번엔 삼별초가 반발해서 진도로, 그다음엔 제주도로 근거지를 옮기며 1273년까지 독자적인 항쟁을 이어가. 조정이 몽골과 강화를 맺은 뒤에도, 별도의 세력이 섬을 옮겨 다니며 저항을 계속하는 이 패턴 — 낯익지 않아? 국가의 중심이 물리적으로 이동하고, 저항이 여러 층위로 분산되는 이 방식이 이미 고려 때부터 반복되고 있었던 거야.\n\n임진왜란은 이로부터 320년 뒤야. 선조가 도망친 게 조선 역사상 완전히 새로운 수치였다면 훨씬 더 큰 충격이었겠지만, 조선 사람들의 머릿속엔 이미 \"왕이 자리를 옮겨도 나라는 버틴다\"는 오래된 기억이 있었을 거야. 물론 선조의 도망은 강화천도처럼 미리 계획되고 방어 태세를 갖춘 전략이 아니라 다급한 패주에 가까웠으니 같은 무게로 볼 순 없어. 그래도 \"왕의 부재가 곧 국가의 종말은 아니다\"라는 감각 자체는, 이미 고려 때부터 조선 사람들의 정치적 상상력 안에 자리 잡고 있었던 셈이야.", "summary": "선조가 한양을 버리고 도망친 건 일본의 무사도적 전쟁 문법으로는 이해할 수 없는 행동이었어. 성이 함락되면 다이묘는 할복하지 도망가지 않는 게 일본의 규칙이었으니까. 근데 조선은 왕의 물리적 존재와 국가의 생존이 분리된 관료제 국가였고, 이 차이가 왕의 도주에도 불구하고 조선이 저항을 지속할 수 있었던 이유가 됐어.", "note": "※ 고니시가 선조의 도주에 어이없어했다는 기록, 선조의 요동 망명 시도와 좌절, 김충선의 사례는 사료로 확인돼. 다만 '선조의 도주가 결과적으로 나라를 살렸다'는 평가는 역사학자들 사이의 해석이지 확정된 사실 판단은 아니야.", "questions": ["리더 개인의 명예와 조직(국가)의 생존이 분리된 구조와, 하나로 묶인 구조 — 위기 상황에서 어느 쪽이 더 강할까?", "'도망'이 비겁함의 상징이 되는 문화와, 생존을 위한 실용적 선택으로 받아들여지는 문화 — 이 차이는 어디서 왔을까?", "항왜처럼 적국 출신이라도 능력과 충성만 있으면 받아들이는 시스템과, 태생과 가문의 명예를 절대시하는 시스템 — 장기적으로 어느 쪽이 더 유연하게 살아남을까?"]}, {"part": "2부", "title": "177년 만의 재발견", "subtitle": "이순신이 다시 켠 스위치", "body": "1591년 2월 13일, 이순신이 전라좌수사에 임명돼. 종6품에서 정3품으로 단계를 건너뛰는 파격 승진이라 조정에서 반발이 상당했어. 김성일 같은 신하는 경험이 부족하다며 반대했고. 근데 이 임명이, 정확히 임진왜란 발발 1년 2개월 전이었어.\n\n### 1년 동안 한 일\n\n이순신은 부임하자마자 움직여. 무기와 군량을 확충하고, 판옥선을 정비하고 새로 지어서 전라좌수영이 20여 척(많게는 29척)의 판옥선을 보유하게 만들어. 바닷가 섬에 둔전을 설치해서 군량을 자체 확보하자고 조정에 건의도 하고. 훈련도 거르지 않았어.\n\n이 와중에 조정에서 황당한 명령이 하나 내려와. \"일본은 섬나라니까 수군이 강할 거다, 수군을 육지로 올려서 수비를 강화하라\"는 거야. 2부 3화에서 본 그 패턴 — 과거 경험(해적 규모 왜구)에 갇혀서 새로운 위협의 실체를 못 읽는 사고방식이 여기서도 반복돼. 근데 이순신은 이걸 정면으로 반박해. \"수륙의 전투와 수비, 어느 하나도 없애서는 안 됩니다.\" 이 한 문장이 조선 수군을 살렸어.\n\n### 판옥선, 끊기지 않았던 계보\n\n여기서 1부를 다시 불러오자. 판옥선은 갑자기 나온 배가 아니야. 최무선의 화포 함대(누전선)부터 이어지는 계보의 최신형이야. 1555년 을묘왜변, 2부 2화에서 본 그 사건 이후로 조선은 수군력을 대대적으로 강화하면서 판옥선을 본격 도입해. 당시에도 소함주의자와 대함주의자 간의 논쟁이 있었다고 하니, 나름 치열한 기술적 고민 속에서 발전한 배였던 거지.\n\n1부 2화에서 던진 논지 기억나? \"가별초는 해체됐지만 화포·수군은 제도화되어 살아남았다.\" 판옥선이 바로 그 생존의 증거야. 이순신이 이 계보를 이어받아서 정비하고 증설한 게, 전쟁이 터졌을 때 조선이 가진 거의 유일한 준비된 자산이 됐어.\n\n### 177년 만에 다시 켜진 스위치\n\n근데 진짜 극적인 건 거북선이야. 이순신은 나대용의 도움을 받아 거북선을 새로 만들어. 난중일기를 보면 날짜가 소름 돋게 정확해 — 2월 8일 \"거북선에 쓸 범포 29필을 받다\", 3월 27일 \"거북선에서 포 쏘는 것을 시험했다\", 4월 11일 \"포범을 만들었다\", 4월 12일 \"거북선에서 지자포·현자포를 쏘아봤다.\" 그리고 다음 날, 4월 13일 — 일본군이 부산에 상륙해.\n\n거북선이 완성된 게 전쟁 발발 하루 전이야. 이순신 자신도 장계에 이렇게 적어 — \"신이 일찍부터 섬 오랑캐가 침노할 것을 염려하고 특별히 거북선을 만들었습니다.\" 이 \"특별히 만들었다\"는 표현, 1부 2화 기억하는 사람은 바로 알아챌 거야. 1413년 태종 때 이미 거북선이라는 이름의 배가 실험된 적이 있었잖아. 근데 그건 177년간 실록에서 완전히 사라졌었지. 그 프로토타입은 아마 효용성이 떨어져서 이어지지 않았을 거라는 평가가 있어. 진짜 실전에서 쓸 수 있는 거북선을 처음 설계하고 운용한 건 이순신이 맞아.\n\n즉 이건 단순한 반복이 아니라 재발명에 가까워. 177년 전 잠깐 켜졌다가 위협이 줄면서 꺼진 그 스위치가, 위협이 국가급으로 돌아온 바로 이 순간, 정확히 필요한 사람의 손에서 다시 켜진 거야. 다만 이번엔 우연이 아니라 — 이순신이라는 한 개인의 선견지명과 1년이라는 준비 기간이 있었기에 가능했던 재발명이었어.\n\n### 화포전이 백병전을 이기다\n\n판옥선과 거북선의 전술적 핵심은 이거야. 조선 수군은 원거리에서 화포로 적선을 먼저 부수고, 필요하면 근접해서 마무리하는 방식이었어. 반면 일본군은 조총을 쏘거나 배에 올라타서 백병전을 벌이는 방식이었지. 거북선은 판옥선에 지붕을 씌워서 조총 공격에 취약했던 갑판을 장갑화하고, 적진 깊숙이 돌진해서 화포로 진형을 흔드는 역할을 맡았어.\n\n이게 왜 중요하냐면, 육상에서는 조총의 화력과 실전 경험이 조선을 완전히 압도했는데(2부 1화, 4화), 바다에서는 정반대 그림이 나왔다는 거야. 조선은 고려 시대부터 쌓아온 대형 화포 해상 운용 경험이 있었고, 일본은 노량해전 때까지도 해전용 중화포를 제대로 갖추지 못했어. 육지에서 진 게임을, 바다에서는 조선이 유리한 규칙으로 다시 시작한 셈이지.\n\n### 결과\n\n5월 29일(음력), 사천해전에서 거북선이 처음 실전에 투입돼. 이후 옥포, 당포, 당항포를 거쳐 7월 한산도대첩까지 이어지는 연승. 조선 수군은 남해의 제해권을 완전히 장악하고, 일본이 계획했던 수륙병진(육군은 북상, 수군은 서해로 돌아 압록강까지 진격) 전략을 무산시켜. 2부 6화에서 본 평양성에서의 멈춤, 그 결정적 원인 중 하나가 바로 이거였어.\n\n한 사람이 1년 동안 준비한 배 몇십 척이, 200년 가까이 쌓인 육상의 격차를 상쇄하는 거의 유일한 버팀목이 됐던 거야.\n\n### 화약은 하늘에서 떨어지지 않았다\n\n근데 여기서 한 가지 짚어야 할 게 있어. \"바다에는 화약이 많았다\"는 말, 사실 절반은 착시야. 이순신도 염초 부족과 싸웠어. 다만 전라좌수영에는 이봉수라는 뛰어난 화약제조가가 있었고, 이 사람이 3개월 만에 염초 1000근을 만들어서 전투에 보탰다는 기록이 있어. 하늘에서 떨어진 게 아니라, 이순신이 부임 후 1년간 조직한 자급 시스템의 결과물이었던 거지.\n\n왜 이게 육지보다 훨씬 잘 됐을까. 3~4화에서 본 국가 단위 염초 생산이랑 비교하면 구조 자체가 달라. 육지는 전국 각지에 흩어진 진관·방어사 조직에 염초를 도별로 할당하고 상납시키는 방식이었어. 관리 단계가 많고, 명령이 여러 층을 거치고, 왜인 유출을 우려해서 생산지까지 중앙이 통제하려 했지. 크고 느슨한 시스템이라 새는 데가 많았어. 반면 이순신은 좁은 관할구역 안에서 자기 함대 하나 먹일 양만 집중 생산하면 됐어. 목표가 작고 명확하고, 지휘 단계가 짧고, 본인이 직접 감독했지. 국가 전체의 만성 적자를 해결한 게 아니라, 한 함대 규모의 수요를 한 사람이 밀착 관리해서 채운 거야.\n\n근데 이건 능력과 구조의 차이만은 아니야. 의지의 차이이기도 해. 육지에서는 애초에 화약을 쓸 생각 자체가 희미했어. 3화에서 본 5위 체제 붕괴, 4화에서 본 신립의 급조 농민병 — 이 군대들은 화약무기를 지속적으로 훈련하고 비축할 여력도, 그럴 계획도 없었어. 반면 이순신의 난중일기를 보면 훈련이 일상이었어. 2월엔 거북선용 범포를 챙기고, 3월엔 포를 시험 발사하고, 4월엔 지자포·현자포를 실제로 쏴보고 — 이게 전쟁 발발 직전까지 계속 이어지는 루틴이었어. 화약을 모으는 것과 화포를 쏘는 훈련을 반복하는 것, 이 둘이 같이 가야 자산이 실제 전력이 되는데, 육지는 이 두 가지 모두를 놓치고 있었고 바다는 둘 다 붙잡고 있었던 거야.\n\n그러니까 정확한 결론은 이거야. 화약은 국가가 자급을 못 한 게 아니라, 그 자급을 챙길 의지와 관리 반경이 육지에는 없었고 이순신에게는 있었던 거지. 같은 나라, 같은 시기, 같은 원료 조건인데 결과가 이렇게 갈린 이유가 바로 여기 있어.", "summary": "이순신은 전쟁 발발 1년 전 부임해서 판옥선을 증설하고, 177년 전 태종 때 실험만 되고 사라졌던 거북선을 실용화된 형태로 재발명했어. 화약 역시 국가가 못 채운 게 아니라, 좁은 관할구역에서 밀착 관리한 이순신의 의지가 채운 거였어. 거북선은 전쟁 발발 하루 전 완성됐고, 원거리 화포전으로 일본의 근접 백병전 문법을 무너뜨리며 조선이 육상에서 잃은 것을 바다에서 상쇄하는 결정적 자산이 됐어.", "note": "※ 이순신의 임명 시점과 반발, 난중일기의 거북선 건조 기록, 판옥선의 을묘왜변 이후 도입 경위는 사료로 확인돼. 다만 '177년 전 거북선이 효용성 부족으로 단절됐다'는 평가는 학계의 정황적 해석이야.", "questions": ["200년 가까이 억눌리고 방치됐던 기술 전통이, 위협이 돌아오자 딱 한 사람의 준비된 실행력으로 되살아났다는 것 — 이게 시스템의 문제였을까, 아니면 결국 사람의 문제였을까?", "이순신이 조정의 \"수군을 육지로 올려라\"는 명령에 반박하지 않았다면 어떻게 됐을까? 한 사람의 반박이 역사를 바꾼 다른 사례를 떠올릴 수 있을까?", "육지와 바다, 같은 나라 같은 시기인데 왜 이렇게 다른 결과가 나왔을까? 이게 이 책 전체의 주제(무기·기술·제도)와 어떻게 이어질까?"]}, {"part": "2부", "title": "12척의 기적이 아니라 1척이 만든 기적", "subtitle": "명량, 고립된 대장선의 두 시간", "body": "\"신에게는 아직 12척의 배가 남아있습니다.\" 이 말은 유명하지. 근데 1597년 9월 16일 명량 해협에서 실제로 벌어진 일을 난중일기로 재구성해보면, 이 숫자조차 절반의 진실이었다는 걸 알게 돼. 전투가 시작되고 상당한 시간 동안, 싸운 건 12척이 아니라 딱 1척이었어.\n\n### 나머지 11척은 어디 있었나\n\n이순신의 대장선이 가장 먼저 앞으로 나아가 적선을 막아서고 포격을 시작해. 근데 뒤를 돌아보니 다른 장수들의 배는 이미 한 마장(약 400미터)쯤 물러나 있었어. 전라우수사 김억추의 배는 그보다 더 멀어서 아득히 보이지도 않을 지경이었고. 이순신은 난중일기에 이 순간을 이렇게 적어 — \"여러 배를 돌아다보니, 이미 한 마장쯤 뒤로 물러나 있었다.\" 왜군의 숫자와 울돌목의 거센 조류에 압도당한 부하 장수들이, 본능적으로 도망갈 생각부터 하고 있었던 거야.\n\n### 처형하고 싶었지만 할 수 없었다\n\n이순신의 반응이 진짜 흥미로운 지점이야. 그는 곧바로 중군장 김응함의 배로 가서 목을 베어 효시하고 싶었다고 적어. 근데 그러지 못해. 이유가 뭐냐면 — \"내 배가 뱃머리를 돌리면, 다른 여러 배는 즉시 더욱더 멀리 물러날 것\"이기 때문이야. 처벌하러 가는 그 순간, 대장선이 전선에서 이탈하는 걸로 보여서 나머지 배들이 아예 전장을 이탈해버릴 수 있었던 거지. 처벌도 못 하고, 지원도 못 받는 딜레마 속에서 이순신이 택한 건 딱 하나였어. 물러나지 않고, 혼자서 계속 버티는 것.\n\n### 두세 시간, 홀로\n\n그렇게 대장선 한 척이 밀려드는 적선 수십 척을 상대로 두세 시간을 버텨. 난중일기에 기록된 이날 대장선의 피해는 사망 2명, 부상 3명뿐이야. 혼자서 그렇게 오래 싸웠는데 이 정도 피해라면, 사실상 일본군이 일방적으로 격파당하고 있었다는 뜻이지. 여기엔 이유가 있어 — 판옥선은 선체가 높고 견고해서 일본군이 기어올라 백병전을 벌이기가 애초에 어려웠고, 화포까지 갖추고 있었으니까. 혼자서도 버틸 수 있는 물리적 조건이 갖춰져 있었던 거야.\n\n### 이름을 부르다\n\n전투가 소강상태에 접어들자 이순신은 신호기와 초요기(부하를 부르는 깃발)를 세워서 뒤에 있던 배들을 불러. 거제현령 안위가 먼저 다가오자 이순신은 배 위에 서서 직접 소리쳐 — \"안위야, 군법에 죽고 싶으냐, 네가 군법에 죽고 싶으냐. 살려고 달아나도, 어디를 가겠단 말이냐.\" 뒤이어 도착한 김응함한테도 \"중군장이 되어서 멀리 피하고 대장을 구하려 하지 않으니 그 죄를 어찌 벗어나겠느냐, 당장 처형하고 싶지만 적의 형세가 급하니 우선 공을 세우게 하겠다\"고 다그쳐.\n\n안위가 황급히 적선 속으로 돌입하자, 일본군 장수가 배 세 척을 붙여서 안위의 배에 개미떼처럼 달라붙어. 안위와 부하들이 몽둥이와 창, 돌덩이로 사투를 벌이다 힘이 거의 다하자, 이순신이 직접 뱃머리를 돌려 쫓아가서 그 세 척을 남김없이 격파하고 안위를 구해내. 이 장면을 본 다른 배들, 송여종과 정응두의 배가 그제야 뒤따라와 힘을 합쳐. 정오 무렵 조류의 방향도 조선 수군에 유리하게 바뀌면서, 지금까지 이순신 혼자 감당하던 전세가 완전히 뒤집혀.\n\n### 12척의 기적이 아니라, 1척이 만든 기적\n\n그러니까 \"12척으로 133척을 이겼다\"는 말은 결과만 보면 맞는데, 과정을 보면 정확하지 않아. 진짜 기적은 12척이 처음부터 힘을 합친 게 아니라, 두려움에 얼어붙어 물러나 있던 11척을, 대장선 1척이 두세 시간 동안 홀로 버티면서 다시 전장으로 끌고 들어온 거야. 나름 역전의 용사였던 안위, 김응함, 배흥립 같은 장수들조차 처음엔 공포에 질려 움직이지 못했어. 근데 이순신이 이름을 부르며 다그치자 곧바로 움직였지. 사형이 기다린다고 해도 안 움직였을 사람들이 왜 움직였을까 — 그건 이순신이라면 분명 이기고 자기들도 살릴 방법이 있을 거라는 확신이 있었기 때문일 거야.\n\n리더 한 사람이 버티는 시간이 임계점을 넘기면, 얼어붙어 있던 조직 전체가 다시 움직이기 시작한다는 것. 명량이 보여주는 진짜 기적은 숫자의 기적이 아니라 이 지점에 있어.", "summary": "명량해전은 12척 대 133척의 싸움으로 알려져 있지만, 실제로는 전투 초반 두세 시간 동안 이순신의 대장선 1척만이 싸우고 나머지 11척은 뒤로 물러나 있었어. 이순신은 물러난 장수들을 처형할 수도 없고 지원을 받을 수도 없는 상황에서 혼자 버텼고, 그 시간이 다른 배들을 다시 전장으로 끌어들이는 결정적 계기가 됐어.", "note": "※ 대장선의 고립, 김억추의 이탈, 안위·김응함을 부른 초요기 사건과 호통은 난중일기에 직접 기록된 내용이야. 다만 참전 함선 수는 『선조실록』(13척)과 『선조수정실록』(12척) 사이에 차이가 있어.", "questions": ["리더가 위기 앞에서 '처벌'도 '후퇴'도 못 하고 그저 '버티는' 선택을 해야 할 때, 그게 무능이 아니라 최선일 수 있는 이유는 뭘까?", "얼어붙은 조직을 움직인 건 이순신의 호통이 아니라 그가 먼저 두세 시간을 버텨낸 '신뢰'였다는 것. 지금 우리 조직에서 리더의 말보다 행동이 더 크게 작용했던 경험이 있을까?", "\"12척의 기적\"이라는 단순화된 서사와 \"1척이 버틴 두 시간\"이라는 실제 과정, 어느 쪽이 더 큰 울림을 줄까? 왜 우리는 종종 더 단순한 쪽을 기억할까?"]}, {"part": "2부", "title": "김시민의 아들은 나루토가 아니었다", "subtitle": "진주성, 그리고 일본 무대에 남은 조선인의 복수", "body": "한산도대첩, 행주대첩과 함께 임진왜란 3대첩으로 꼽히는데, 정작 이름은 앞의 둘보다 덜 알려진 전투가 진주성이야. 이유가 있어 — 이순신도 권율도 전쟁 끝까지 살아남아 계속 활약했는데, 김시민은 이 전투에서 죽었거든. 그리고 그 죽음마저, 조선이 제대로 대접하지 못했어.\n\n### 성 안에서 미리 이겨놓은 전투\n\n1592년 10월, 일본군 2~3만이 진주성을 포위해. 성 안에는 관군 3,800여 명뿐. 근데 김시민은 이 전투를 불과 며칠 준비한 게 아니야. 이미 화약 500여 근을 비축하고 총통 70여 자루를 제작해서 사용법까지 훈련시켜둔 상태였어. 비격진천뢰, 현자총통, 질려포 같은 신무기도 준비돼 있었고. 8화에서 본 이순신의 '1년 준비'가 육지에서도 반복된 셈이야.\n\n전술도 치밀했어. 화살을 함부로 쏘지 못하게 아꼈다가 결정적일 때 집중 사격하고, 노약자와 여성한테까지 군복을 입혀 야간에 횃불을 들려서 병력이 훨씬 많아 보이게 위장했어. 밤에는 악공을 시켜 거문고와 퉁소를 연주해서 아군은 안정시키고 일본군한테는 향수병을 자극하는 심리전까지 썼지.\n\n가장 흥미로운 결정 하나는 지휘 체계야. 김시민보다 계급이 높은 경상우병사 유숭인이 성 안에 들어와 함께 싸우겠다고 했는데, 김시민은 이걸 거절해. 지휘 계통에 혼선이 생길까 봐서였어. 곽재우는 이 결정을 듣고 \"계책이 성을 온전하게 하기에 충분하니 진주 백성들의 복이다\"라고 평했어. 4화에서 본 신립의 급조 오합지졸 문제와 정반대야 — 김시민은 소수라도 지휘가 일원화된 정예 조직을 지키는 쪽을 택한 거지.\n\n7일간의 공방전 끝에 일본군은 물러나. 지휘관급 300명, 병사 1만여 명이 죽었다는 추산이 있고, 일본군은 손실을 감추려고 시신을 전부 불태우고 후퇴했어. 이 정도 피해는 일본 육군이 그때까지 겪어본 적 없는 수준이었어. 이 전투 하나로 일본은 전라도 곡창지대로 가는 길을 완전히 차단당했지.\n\n### 이마에 탄환을 맞고\n\n근데 전투가 거의 끝나갈 무렵, 김시민은 이마에 총탄을 맞고 쓰러져. 곤양군수 이광악이 대신 지휘를 맡아 승리를 완성했고, 김시민은 9일간 사경을 헤매다 39세로 순국해. 일본군의 재공격을 우려해서 전사 소식은 한동안 비밀에 부쳐졌어.\n\n### 정론이 아니었다\n\n여기서 10~11화의 패턴이 또 다른 모양으로 반복돼. 1604년 선무공신을 책봉할 때, 1등엔 이순신·권율·원균이 오르고 김시민은 2등에 그쳐. 백사 이항복은 이걸 두고 \"임진왜란 중 김시민의 공이 가장 큰데 2등에 책봉하는 건 정론이 아니다\"라고 직접 이의를 제기했어. 하담 김시양도 \"진주대첩이 한산도대첩보다 큰 승리\"라고 주장했지만 받아들여지지 않았고.\n\n더 씁쓸한 건 실록의 기록이야. 김시민의 졸기는 \"경상우도병마절도사로 삼았는데, 얼마 뒤에 졸하였다\"는 단 한 줄로 끝나. 그의 구체적인 행적은 실록이 아니라 후대(1794년)에 홍양호가 편찬한 사찬 역사서 『해동명장전』에 의존해서 전해져. 조선을 살린 가장 결정적인 승리 중 하나를 이끈 사람이, 죽었다는 이유만으로 국가의 공식 기록에서는 이렇게 소략하게 처리된 거야.\n\n김종서, 남이, 김덕령, 이순신은 살아있을 때 의심받고 처벌받았지. 김시민은 다른 방식으로 지워졌어 — 박해가 아니라 무관심으로. 죽은 자는 변명할 수도, 다음 전공을 세울 수도 없으니까.\n\n### 두꺼비를 타고 돌아온 조선인\n\n이 전쟁의 흔적은 뜻밖에도 일본 대중문화에도 남았어. 일본 가부키에는 『천축덕병위한화(天竺徳兵衛韓噺)』(1804년 초연, 원형은 1763년)라는 작품이 있는데, 주인공의 아버지 요시오카 소칸은 \"조선국의 신하\"로 설정돼 있어. 히데요시의 조선 침략에 대한 원한을 풀기 위해 몰래 일본에 잠입한 인물이고, 죽기 직전 아들에게 두꺼비 요술을 전수해서 일본을 전복하게 만들어. 심지어 1763년 초연 당시엔 이 이야기의 배경이 아예 \"관백 태합 히데요시\" 시대로 설정돼 있었다는 기록도 있어.\n\n다만 이 아버지 인물이 \"김시민\"으로 특정된다는 근거는 일본 사료 어디에도 없어. 그냥 \"조선국의 신하\"라는 익명의 상징일 뿐이야. 그리고 이 작품과 나루토의 두꺼비 선인 캐릭터를 직접 잇는 계보도 확인되지 않아 — 나루토의 지라이야는 이것과는 다른, 더 후대(1806년 이후)의 별개 설화 계통에서 나왔어. 다만 \"두꺼비 요술사\"라는 이미지 자체가 에도 시대 가부키에서 하나의 장르로 굳어졌고, 그 장르의 뿌리 중 하나가 임진왜란에 대한 조선인의 복수라는 설정이었다는 것 — 이건 확실한 사실이야. 가해국이었던 일본 스스로가, 자기들이 침략한 나라의 원한을 무대 위에서 오락으로 소비했다는 거지.\n\n김시민이라는 이름을 특정할 순 없지만, 조선을 짓밟은 전쟁의 트라우마가 승전국의 문화 속에도 이렇게 이상한 형태로 남아있었다는 건 그 자체로 곱씹어볼 만한 사실이야.", "summary": "김시민은 3,800명으로 3만에 가까운 일본군을 물리쳤지만 전투 막바지에 전사했고, 그 결과 논공행상에서는 부당하게 2등에 그쳤고 실록에는 단 한 줄로 처리됐어. 살아있는 영웅은 의심받아 처벌되고, 죽은 영웅은 무관심 속에 지워지는 것 — 조선이 공로자를 대하는 두 가지 방식이었어. 한편 일본 가부키에는 임진왜란에 대한 조선인의 복수를 그린 '두꺼비 요술사' 이야기가 실제로 존재했지만, 이걸 김시민이나 나루토와 직접 연결할 근거는 없어.", "note": "※ 진주성 전투의 병력, 김시민의 전사 경위, 선무공신 책봉과 이항복의 이의 제기, 실록 졸기의 소략함은 사료로 확인돼. 천축덕병위한화의 설정과 초연 시기도 일본 측 자료로 확인되지만, 그 인물이 김시민이라거나 지라이야/나루토와 직결된다는 건 근거가 없어.", "questions": ["살아서 의심받는 것과 죽어서 잊히는 것, 어느 쪽이 더 부당하다고 느껴져?", "가해국의 대중문화가 피해국의 복수 서사를 오락으로 소비하는 것, 이걸 어떻게 해석해야 할까 — 반성일까, 또 다른 형태의 소비일까?", "매력적인 이야기(김시민의 아들=지라이야)와 정확한 사실 사이에서, 우리는 왜 종종 매력적인 쪽을 믿고 싶어할까?"]}, {"part": "2부", "title": "이순신이 유일하게 진 게임의 룰", "subtitle": "노량, 통제된 전투와 통제되지 않은 전투", "body": "한산도, 명량. 이순신의 대표 해전들을 다시 떠올려봐. 공통점이 하나 있어. 전부 이순신이 미리 위치를 설계하고, 적을 그 위치로 끌어들이는 게임이었어. 한산도는 좁은 견내량을 버리고 넓은 바다로 유인했고, 명량은 좁은 물목에서 대장선이 버티며 조류가 바뀌기를 기다렸어. 통제된 진형, 통제된 거리, 통제된 시점. 이순신이 죽지 않고 20번 넘게 이긴 이유가 여기 있었어.\n\n근데 노량은 완전히 다른 전투였어.\n\n### 추격전이라는 다른 게임\n\n1598년 11월 19일, 도요토미 히데요시가 죽고 일본군이 총퇴각을 시작해. 순천왜성에 갇힌 고니시 유키나가를 구하러 시마즈 요시히로의 함대가 노량으로 접근하고, 이순신은 관음포에 매복해뒀다가 이들을 요격해. 여기까진 여느 해전처럼 통제된 상황이야. 근데 전투가 진행되면서 이순신은 도주하는 일본 함대를 관음포까지 추격해 들어가.\n\n추격은 본질적으로 진형이 무너지는 행위야. 앞장서서 쫓다 보면 지원하는 배들과 거리가 벌어지고, 대장선이 단독으로 적진 깊숙이 들어가는 상황이 만들어져. 여기서 결정적인 사실 하나 — 이순신과 맞선 시마즈 요시히로의 부대는 정예 저격수 집단을 운용하며, 퇴각전에서 적장을 기습 저격하는 전술을 즐겨 썼던 걸로 알려져 있어. 궁지에 몰린 정예 저격수 부대한테, 진형에서 앞서 나간 가장 눈에 띄는 지휘선은 최적의 표적이었던 거지.\n\n즉 이순신을 쓰러뜨린 건 방심이 아니라, 그가 20번 넘게 반복해온 승리 공식 — 위치를 설계하고 적을 끌어들이는 통제된 전투 — 이 통하지 않는 유일한 전투 유형에, 마지막으로 딱 한 번 들어섰기 때문이었어. 자기가 만든 게임의 룰 밖으로 나간 순간이 하필 마지막이었던 거야.\n\n### 자살설, 그리고 그 반박\n\n이 죽음을 둘러싸고 오래된 논쟁이 하나 있어. 이순신이 실은 스스로 죽음을 택했다는 설이야. 근거로 제시되는 정황은 이래 — 전사 시각이 새벽 2시라는 어둠, 그리고 20여 회의 전투 동안 한 번도 참전한 적 없던 아들과 조카가 이 전투에만 함께 배에 타고 있었고, 이 둘이 이순신의 죽음을 목격한 유일한 사람으로서 전투가 끝날 때까지 몇 시간 동안 그 사실을 숨겼다는 것.\n\n이 설을 지지하는 논리는 11화에서 본 그 패턴과 이어져 있어. 선조는 전쟁 중에도 이순신을 하옥하고 고문할 만큼 그를 의심했잖아. 전쟁이 끝나면 그 의심이 더 심해질 거라는 우려, 김종서·남이·김덕령이 반복해서 겪은 그 운명이 자기한테도 올 거라는 예감 — 그러니 차라리 전쟁 영웅으로 명예롭게 전사하는 편이 낫다고 판단했을 수 있다는 거야.\n\n근데 반박도 강력해. 이순신의 목표는 애초에 도주하는 일본군의 완전한 섬멸이었어. 노량해전은 그가 계획한 '마지막 전투'가 아니라, 고니시를 완전히 궤멸시키기 위한 과정의 일부였을 뿐이야. 실제로 그가 죽자 항전 의지를 잃은 조명연합군은 추격을 멈췄고, 결과적으로 고니시를 비롯한 일본군 핵심 장수들 대부분이 무사히 본국으로 돌아가. 자기가 가장 중요하게 여긴 목표(완전 섬멸)를 스스로 무너뜨릴 자살을 계획했다는 건 앞뒤가 안 맞는다는 거지.\n\n### 두 가설이 만나는 지점\n\n흥미로운 건, 이 두 설명(저격 취약성과 자살설)이 서로 배타적이지 않다는 거야. 굳이 스스로 죽음을 원하지 않았더라도, 선조의 의심이 반복될 걸 알고 있던 사람이 이례적으로 위험한 추격전에서 몸을 사리지 않았을 가능성은 있어. 진두지휘하며 뱃머리에 나서서 적을 지휘하다가 탄환에 맞았다는 기록 자체가, 통제된 전투에서 보여온 신중함과는 결이 다른 행동이었던 거지. 의도적 자살은 아니었어도, \"이번엔 물러서지 않겠다\"는 결의가 평소보다 컸을 가능성은 남아.\n\n확실한 건 이거야. 이순신은 자기가 설계한 게임 안에서는 단 한 번도 지지 않았어. 그가 유일하게 쓰러진 순간은, 자기 게임의 룰이 적용되지 않는 낯선 전장 — 통제할 수 없는 추격전, 그것도 저격에 특화된 부대를 상대로 — 에 들어섰을 때였어.", "summary": "한산도와 명량이 이순신이 위치와 시점을 설계해 적을 끌어들이는 통제된 전투였다면, 노량은 도주하는 적을 쫓는 추격전이라 그가 처음으로 진형 밖에서 단독으로 노출된 전투였어. 게다가 상대는 퇴각전 저격에 능한 시마즈군이었어. 자살설도 있지만, 완전 섬멸이라는 그의 목표와 죽음 이후 추격이 중단된 결과를 보면 설득력이 약해.", "note": "※ 노량해전의 추격 경위와 전사 상황, 시마즈군의 저격 전술 평판은 사료와 통설로 확인돼. 다만 저격설과 자살설 모두 직접 증거는 없는 정황적 추론이야.", "questions": ["한 사람이 반복해서 이겨온 '자기만의 필승 공식'이 통하지 않는 낯선 상황에 놓였을 때, 그 순간이 가장 위험해진다는 것 — 다른 역사적 인물이나 우리 삶에서도 비슷한 사례를 찾을 수 있을까?", "자살설처럼 매력적이지만 증거가 약한 가설과, 덜 극적이지만 정황이 더 잘 들어맞는 설명 — 우리는 왜 종종 전자에 더 끌릴까?", "이순신이 노량에서 몸을 사리지 않았을 가능성, 그게 자살은 아니어도 '어차피 돌아가면 또 의심받을 것'이라는 체념에서 나온 태도였다면 — 이것도 일종의 죽음일까?"]}, {"part": "2부", "title": "판옥선으로는 일본을 정벌할 수 없었다", "subtitle": "판옥선이라는 국가의 자화상", "body": "\"이순신이 노량에서 죽지 않고 더 살았다면 일본을 정벌하지 않았을까.\" 이 상상, 한 번쯤 해봤을 거야. 근데 이 질문 자체가 틀을 잘못 짚었다면?\n\n### 판옥선은 처음부터 이기기 위한 배가 아니라 안 지기 위한 배였다\n\n판옥선의 구조부터 다시 보자. 배 밑이 평평한 평저선이야. 이게 조선 근해 — 암초 많고 조수간만 차가 심한 바다 — 에서는 최적이야. 흘수선이 낮아서 갑자기 썰물이 져도 뒤집히지 않고, 선회 기동에 유리해서 화포를 쏘고 재빨리 방향을 트는 전술에 딱 맞아. 근데 그 대가로 직진 능력과 속도를 포기했어. \"속도가 느린데다 먼 바다까지 나아가는데 애로사항이 많아 범용성이 좋은 구조는 아니었다\"는 게 정직한 평가야.\n\n일본의 아타케부네는 반대야. 배 밑이 뾰족한 첨저선이라 빠르고 원양 항해에 유리해. 대신 회전이 둔하고 얕은 바다에서는 불리하지. 이 두 배의 차이가 뭘 말해주냐면 — 판옥선은 \"내 앞마당에서 적을 막는\" 설계고, 아타케부네는 \"남의 바다까지 가서 싸우는\" 설계라는 거야. 배 하나만 봐도 두 나라가 전쟁을 통해 무엇을 하려 했는지가 드러나.\n\n### 부산까지 가는 데 나흘\n\n이순신이 실제로 부산포까지 진격한 적이 있어(1592년 8월). 근데 견내량을 나서서 부산 인근에 닿기까지 거의 나흘이 걸렸어. 이것도 조선 땅 안, 자기 나라 해안선을 따라가는 길이었는데 이 정도로 신중하고 오래 걸렸다는 거야. 현해탄을 건너 낯선 일본 해안까지 가는 건 차원이 다른 문제지. 낯선 조류, 낯선 지형, 그리고 결정적으로 판옥선의 속도로는 보급선이 계속 함대를 따라잡아야 하는데, 그게 조선 근해 안에서도 벅찬 일이었어. 대양을 건너 이역만리 적지에서 그걸 유지한다는 건 이 시대 판옥선 체계로는 애초에 설계 밖의 일이었던 거야.\n\n### 이건 이순신 개인의 한계가 아니다\n\n여기서 이 책 전체가 다시 만나. 1부에서 계속 본 게 뭐였지 — 사병 해체(1화), 화기 억압(5화), 위협이 줄면 꺼지는 무기(2화). 2부 3화에서 본 유교적 세계관 — \"우리는 잘못한 게 없으니 전쟁이 날 리 없다.\" 이게 전부 하나의 방향을 가리켜. 조선은 밖으로 뻗어나가는 힘이 아니라 안을 지키는 힘만 설계된 나라였어.\n\n판옥선도 정확히 같은 DNA야. 이순신이 자기가 아는 물길에서만 싸우려 했던 건 개인의 신중함이기도 하지만, 그가 지휘한 배 자체가 애초에 원정을 상상할 수 없는 형태로 만들어져 있었어. 국가가 침략을 목적으로 함선을 설계한 적이 없는데, 그 배를 타고 침략을 나가는 건 이순신 한 사람의 천재성으로 뛰어넘을 수 있는 문제가 아니었던 거지.\n\n### 그러니까 진짜 질문은 이거다\n\n\"이순신이 더 오래 살았다면 조선이 일본을 정벌했을까\"가 아니라 — \"이순신 한 사람의 천재성으로도 넘을 수 없었던, 국가 설계 자체의 한계는 무엇이었나\"야. 조선은 최고의 방어 시스템을 만드는 데는 성공했어. 근데 방어 시스템을 아무리 잘 만들어도, 그걸로 공격은 못 해. 이건 능력의 문제가 아니라 애초에 다른 목적으로 만들어진 도구의 문제야.\n\n### 2부를 닫으며\n\n1부 서장에서 던진 질문 기억나? 조선은 무신정권의 재발을 막기 위해 모든 형태의 무력을 의심하고 가두도록 설계된 나라였어. 2부 전체는 그 설계가 임진왜란이라는 실전 앞에서 어떻게 무너지고, 어떻게 버텨냈는지를 본 거야. 노부나가와 히데요시의 넘쳐나는 군사력(1화), 세계 최대급 전쟁이라는 규모(2화), 도덕으로 세계를 읽다 놓친 위협(3화), 어제의 전쟁 문법에 갇힌 신립(4화), 이해할 수 없었던 왕의 도주(5화), 오치무샤가리와 다른 조선 백성의 활(9화) — 그리고 이순신이라는, 이 모든 결핍 속에서도 예외적으로 준비된 한 사람(7~8, 11~14화).\n\n근데 그 이순신조차, 국가가 설계한 도구의 한계 밖으로는 나갈 수 없었어. 조선을 지킨 힘과 조선이 갖지 못한 힘, 그 경계선이 정확히 판옥선의 뱃머리에 있었던 거야.\n\n3부에서는 이 방어의 논리가 또 다른 적 — 청나라 — 앞에서 어떻게, 왜 완전히 다른 방식으로 무너지는지를 보게 될 거야.", "summary": "판옥선은 조선 근해 방어에 최적화된 평저선이라 속도가 느리고 원양 항해에 불리했어. 이순신이 부산까지 가는 데도 나흘이 걸렸을 정도로, 낯선 바다로의 원정은 이 배 체계로는 애초에 설계 밖의 일이었어. 이건 이순신 개인의 한계가 아니라, 방어만을 설계한 국가 자체의 한계였어.", "note": "※ 판옥선과 아타케부네의 구조적 차이, 부산포해전의 진격 기간은 사료와 통설로 확인돼. '이순신이 일본을 정벌했을 것'이라는 가설 자체는 실제 역사적 논의가 아니라 대중적 상상이라는 점도 밝혀둘게.", "questions": ["방어에 최적화된 도구와 공격에 최적화된 도구, 이 둘은 정말 양립 불가능할까? 아니면 조선이 다른 선택을 할 수도 있었을까?", "개인의 천재성이 시스템의 한계를 넘을 수 없다는 것, 이순신 말고 다른 역사적 인물이나 우리 주변에서도 비슷한 사례를 찾을 수 있을까?", "\"정벌했을 것이다\"라는 매력적인 가정과 \"애초에 불가능했다\"는 냉정한 분석, 역사를 가르칠 때 어느 쪽이 학생들에게 더 필요한 태도일까?"]}, {"part": "3부", "title": "누르하치가 조선에 두 번 손을 내밀었다", "subtitle": "만력 3대정, 그리고 방치된 누르하치", "body": "임진왜란 얘기할 때 항상 \"명나라가 원군을 보내 조선을 구했다\"로 끝나잖아. 근데 그 원군이 명나라한테 어떤 대가를 요구했는지, 그리고 그 대가가 결국 누구한테 돌아갔는지까지 보면 이야기가 완전히 달라져.\n\n### 세 개의 전쟁이 동시에 터졌다\n\n만력제 재위 시기, 명나라는 정확히 같은 시기에 세 개의 대규모 전쟁을 동시에 치러. 1592년 몽골계 무장 보바이가 일으킨 영하(닝샤)의 난, 같은 해 터진 임진왜란, 그리고 1597년 귀주에서 묘족 토사 양응룡이 일으킨 반란. 이 세 전쟁을 '만력 3대정'이라고 불러. 셋 다 명나라의 승리로 끝나긴 했는데, 8년 동안 은 1,160만 냥 이상을 쏟아부으면서 국고가 완전히 바닥나.\n\n임진왜란은 이 세 전쟁 중 하나였을 뿐이야. 조선 입장에선 나라의 존망이 걸린 전쟁이었지만, 명나라 입장에선 동시에 세 방향에서 터진 소모전 중 하나였던 거지. 그리고 이 세 전쟁을 다 치르고 난 명나라는, 다시는 예전 같은 국력을 회복하지 못해.\n\n### 그 틈에 조용히 자라난 사람\n\n여기서 시점을 옮겨보자. 1583년, 누르하치의 할아버지와 아버지가 명나라 총병에게 억울하게 죽임을 당해. 누르하치는 선조가 남긴 갑옷 13벌로 거병해서 복수를 시작하는데, 이 해가 바로 만력제 초반, 임진왜란보다 9년 앞선 시점이야. 그러니까 누르하치의 여진 통일 사업은 만력 3대정과 정확히 같은 기간(1580년대~1610년대)에 진행되고 있었어.\n\n명나라는 원래 요동도지휘사사 같은 기구로 여진족을 기미제·위소제로 통제하고 있었어. 근데 만력제가 3대정에 국력을 쏟아붓는 동안, 정작 코앞의 요동 변경에서 여진족 하나가 부족들을 통일해가는 걸 제대로 막지 못해. 국가의 시선과 자원이 전부 남쪽(조선)과 서북쪽(닝샤)과 서남쪽(귀주)으로 쏠려 있는 동안, 동북쪽에서 누르하치가 조용히, 그러나 착실히 몸집을 키운 거야.\n\n### 누르하치가 조선에 손을 내밀었다는 사실\n\n여기서 이 책 전체에서 가장 아이러니한 대목이 나와. 누르하치는 임진왜란 기간 중 조선에 지원군을 두 차례나 제안해. 명나라 편에서 싸우는 조선을 돕겠다는 거였어. 근데 조선은 이 제안에 응하지 않아. 조선은 이미 통일을 이룬 여진족을 여전히 얕잡아 봤고, 조선왕조실록에서는 누르하치를 가리켜 정식 음차인 '노(努)' 대신 '종 노(奴)' 자를 써서 '노추(奴酋)'라는 멸칭으로 기록해.\n\n3부 3화에서 본 그 유교적 세계관 기억나? \"우리는 사대의 예를 다했으니 문제없다\"는 그 사고방식이 여기서도 똑같이 작동해. 명나라 중심의 화이질서 안에서, 여진족은 여전히 '오랑캐'였고, 대등한 관계를 맺자는 그들의 제안은 고려할 가치도 없는 무례로 받아들여진 거지. 조선은 자기를 도와주겠다는 손을 스스로 뿌리친 셈이야.\n\n### 22년 뒤, 그 손이 칼이 되어 돌아온다\n\n누르하치는 1616년 후금을 세우고, 1618년 무순을 함락시키며 명나라에 정식으로 '칠대한(七大恨)'을 선포해. 할아버지와 아버지를 명나라가 죽인 것부터 시작하는 일곱 가지 원한이야. 이듬해 1619년 사르후 전투에서 명나라와 조선 연합군을 대파하는데, 이때 조선은 명나라의 요청으로 강홍립이 이끄는 1만 3천 병력을 파병했다가 참패해. 강홍립은 항복하고, 파병군 1만 3천 명 중 조선으로 돌아온 건 3천 명이 채 안 됐어.\n\n정리하면 이래. 명나라는 조선을 구하느라(그리고 동시에 두 개 전쟁을 더 치르느라) 국력을 소진했고, 그 공백에서 누르하치가 자랐어. 그 누르하치는 조선에 두 번이나 손을 내밀었지만 조선은 화이질서의 명분 때문에 거절했어. 그리고 22년 뒤, 조선은 그 거절한 상대와 명나라 편에서 싸우다가 참패하고, 다시 17년 뒤엔 그 상대(이젠 청나라)에게 직접 침략당해.\n\n### 3부의 질문\n\n임진왜란에서 조선은 '방어만 설계된 나라'라는 걸 온몸으로 배웠어(2부 15화). 근데 정작 그다음 위협 — 누르하치라는, 명백히 자라나고 있던 세력 — 앞에서는 그 교훈을 하나도 쓰지 못했어. 오히려 화이질서의 명분에 갇혀서 화해의 기회조차 걷어찼지. 3부는 이 질문에서 시작해. 왜 조선은 뻔히 보이는 다음 위협 앞에서도, 매번 같은 실수를 반복했을까.", "summary": "명나라는 임진왜란을 포함한 세 개의 전쟁(만력 3대정)을 동시에 치르며 국력을 소진했고, 그 틈에 누르하치가 여진족을 통일했어. 누르하치는 조선에 두 번이나 지원을 제안했지만 조선은 화이질서의 명분 때문에 거절했고, 22년 뒤 사르후 전투에서 조선은 그 상대와 싸우다 참패했어.", "note": "※ 만력 3대정의 재정 소모 규모, 누르하치의 거병과 통일 과정, 조선에 대한 지원군 제안과 사르후 전투는 사료로 확인돼.", "questions": ["명나라가 조선을 구원한 게 결과적으로 자기 자신을 무너뜨릴 세력을 방치하는 대가였다는 것 — '누군가를 돕는 선택'이 항상 그 돕는 쪽에게도 이득인 건 아니라는 걸 보여주는 다른 사례가 있을까?", "조선이 누르하치의 손을 거절한 건 명분(화이질서) 때문이었는데, 명분과 실리 중 하나를 선택해야 할 때 우리는 어떤 기준으로 판단해야 할까?", "뻔히 보이는 위협을 매번 놓치는 게 조선만의 문제였을까, 아니면 모든 국가·조직이 겪는 구조적 함정일까?"]}, {"part": "3부", "title": "광해군의 밀지, 식민사관이 만든 신화", "subtitle": "직접 겪어본 자와 명분만 아는 자의 인식 격차", "body": "광해군의 중립외교, 흔히 \"역사에 다시없을 실리외교의 정수\"로 배우잖아. 근데 그 핵심 증거인 '강홍립 밀지'의 계보를 따라가보면, 우리가 알던 이야기가 생각보다 훨씬 복잡해져.\n\n### 분조, 전쟁을 직접 겪은 유일한 왕\n\n먼저 광해군이 다른 왕들과 근본적으로 달랐던 지점부터 보자. 선조가 의주로 도망쳐 명나라 망명까지 시도하는 동안, 세자 광해군은 분조를 이끌고 전국을 돌며 격문을 전하고 의병을 모집했어. 종전 후 선조는 \"조선군은 한 게 없고 명군이 다 해줬다\"는 식으로 자기 파천을 정당화하며 국내 장수들의 공을 축소했는데, 광해군은 정반대의 경험을 갖고 있었어. 직접 전장을 돌아본 사람만 아는 감각이 있었던 거지.\n\n### 밀지의 실체 — \"형세를 보아 향배를 정하라\"\n\n1618년 후금이 요동을 침략하자 명나라는 조선에 파병을 요구해. 광해군은 홀로 반대했어. 근데 신료들의 압박에 밀려 결국 강홍립에게 1만 3천 병력(그중 상당수가 새로 양성한 조총병)을 딸려 보내. 이때 강홍립에게 내린 밀지의 실제 내용이 '관형향배(觀形向背)' — 형세를 보아 나아가고 물러서라는 거였어.\n\n문제는 이게 후대에 \"싸우지 말고 투항하라는 명령\"으로 알려졌다는 거야. 근데 실제 전투(사르후 전투, 1619)를 보면 이 해석이 이상해. 파병군 1만 3천 명 중 9천 명이 전사했어. 김응하 같은 장수는 끝까지 싸우다 죽었고, 강홍립은 패전 후 자결까지 시도했어. 애초에 \"싸우지 말라\"는 명령을 받았다면 이렇게까지 많이, 이렇게까지 격렬하게 싸우다 죽었을까?\n\n### 이 이야기는 누가 만들었을까\n\n여기서 계보를 더 파보면 흥미로운 게 나와. \"밀지=항복 지시\"라는 해석을 근대에 처음 긍정적으로 정립한 사람이 1920년대 일본 학자 이케우치 히로시야. 그것도 조선사를 만주사에 종속시켜 \"조선은 원래 문약하고 당쟁에만 시달렸다\"는 만선사관을 뒷받침하는 논문에서. 게다가 광해군일기(그를 몰아낸 서인이 편찬했으니 나쁘게 쓸 이유는 충분한데도) 어디에도 밀지 내용에 '항복하라'는 문구는 없어.\n\n더 결정적인 건 이 이야기의 정치적 쓸모야. \"광해군이 명나라를 배신하도록 밀명을 내렸다\"는 서사는, 그를 몰아낸 인조반정의 명분으로 딱 맞아떨어져. 즉 우리가 지금 \"통찰력 있는 실리외교\"로 알고 있는 그 이야기가, 원래는 그를 깎아내리려는 정적들의 논리에서 출발했을 가능성이 있는 거지. 그게 20세기에 식민사관과 결합하면서 이상하게도 정반대의 '재평가'로 뒤집힌 거야.\n\n### 그러면 진짜 실리외교는 언제 시작됐을까\n\n내 생각엔 이거야. 광해군의 신중함은 애초부터 완성된 마스터플랜이 아니라, 사르후에서 9천 명을 잃고 나서야 정책으로 굳어졌어. 그 이후 광해군은 명나라의 거듭된 원병 요청을 계속 거절하고, 강홍립을 통로 삼아 후금과 관계를 관리하고, 동시에 압록강 하구에 주둔한 명나라 모문룡 부대한테는 군량을 대주면서 양쪽 모두를 자극하지 않는 줄타기를 해. 이건 처음부터 병력을 아끼려던 설계가 아니라, 값비싼 실패를 겪은 뒤에야 나온 학습의 결과였던 거지.\n\n### 서인의 명분론도 완전히 어리석지는 않았다\n\n여기서 균형을 잡을 부분이 하나 있어. 재조지은(명나라가 나라를 다시 세워준 은혜)을 강조하는 서인의 명분론을, 단순히 \"나라가 망해도 명분 챙기는 멍청함\"으로만 보기엔 억울한 구석이 있어. 생각해보면 이런 질문이 남거든 — 지금 후금한테 붙는다고, 정말 위기가 닥쳤을 때 후금이 수백 년 상국이자 심지어 임진왜란 때 나라를 구해준 맹방을 하루아침에 버린 나라를, 목숨 걸고 지켜줄까? 명나라는 실제로 수십만 대군을 퍼부어 조선을 구해준 몇 안 되는 검증된 우방이었어. 이걸 쉽게 버리는 게 정말 합리적 선택이었을지는, 사실 그렇게 간단하지 않아.\n\n### 인식 격차라는 진짜 축\n\n그러니까 이 대립을 \"멍청한 서인 대 똑똑한 광해군\"으로 단순화하면 틀려. 진짜 축은 이거야 — 분조를 이끌며 전장을 직접 겪어본 사람의 감각과 한양 조정에서 명분과 이념으로 세계를 읽어온 사람의 감각. 2부 3화에서 본 그 유교적 세계관, \"우리는 잘못한 게 없으니 전쟁이 날 리 없다\"는 그 사고방식이 여기서도 똑같이 작동해. 서인은 틀린 판단을 한 게 아니라, 애초에 다른 종류의 정보(전장의 현실이 아니라 명분의 논리)로 세계를 읽고 있었던 거야.\n\n그리고 1623년, 인조반정으로 그 명분 쪽이 다시 권력을 잡아. 이 인식 격차가 다시 명분 쪽으로 기울면서, 조선은 정확히 광해군이 피하려 했던 그 충돌 — 후금(이제는 청)과의 정면 대결 — 을 향해 걸어가게 돼.", "summary": "광해군의 '밀지'는 애초부터 조총병을 아끼려는 치밀한 마스터플랜이 아니라 '형세를 보아 대처하라'는 안전장치였고, 실제로 파병군의 상당수가 전사했어. 이 밀지를 '항복 지시'로 해석한 서사는 인조반정의 명분과 훗날 식민사관에서 강화된 측면이 있어. 광해군과 서인의 진짜 차이는 똑똑함이 아니라, 전장을 직접 겪어본 자와 명분으로만 세계를 읽은 자의 인식 격차였어.", "note": "※ 강홍립 밀지의 내용과 사르후 전투의 피해 규모, 밀지설의 학술사적 계보(이케우치 히로시)는 사료와 연구사로 확인돼. 다만 밀지의 정확한 원래 의도는 여전히 학계에서 논쟁 중이야.", "questions": ["어떤 인물에 대한 '재평가'가 실은 새로운 진실의 발견이 아니라 다른 정치적 목적(이 경우 식민사관)에서 나온 것이었다면, 우리는 그 재평가를 어떻게 다뤄야 할까?", "직접 경험한 자와 명분으로만 판단하는 자의 인식 격차, 지금 우리 사회(정치, 조직, 교실)에서도 비슷한 갈등을 찾을 수 있을까?", "재조지은을 강조한 서인의 논리에도 나름의 현실적 계산이 있었다는 것을 알고 나니, 병자호란을 보는 시각이 어떻게 달라질까?"]}, {"part": "3부", "title": "조선 최정예군을 조선이 스스로 무너뜨리다", "subtitle": "이괄의 난, 최정예군이 스스로를 파괴하다", "body": "병자호란을 배울 때 항상 전제로 깔리는 게 \"조선군이 약했다\"는 거잖아. 근데 숫자를 따라가보면 완전히 다른 그림이 나와. 조선은 청나라한테 그렇게 쉽게 질 병력이 아니었어. 그 병력을 조선 스스로 날려버렸을 뿐이지.\n\n### 반란군의 정체 — 사실은 조선의 최정예\n\n1624년 이괄이 일으킨 반란군, 1만 2천 명. 이게 어떤 병력이냐면 평안도 북방 방어군, 전라도에서 파견된 부방군, 그리고 항왜(임진왜란 때 투항한 일본군 출신) 130여 명이었어. 평안도는 후금을 막기 위한 최전선이니까, 이괄이 지휘하던 병력은 조선에서 가장 실전에 대비된 부대였던 거야. 항왜들은 조총과 근접전에 능해서 이괄이 선봉으로 세웠어.\n\n이 부대의 전투력이 어느 정도였냐면, 황주와 마탄 전투에서 관군을 압도적으로 격파해. 인조실록에 따르면 항왜군이 칼을 휘두르며 돌진하자 관군이 겁을 먹고 뿔뿔이 흩어져 제대로 싸우지도 못했다고 해. 반란군의 기세가 얼마나 셌던지, 조정에서는 진압을 위해 일본에 원병을 요청하는 것까지 심각하게 고려했어. 다행히 신중론이 우세해서 무산됐지만, 이것만 봐도 이 병력이 얼마나 강력했는지 짐작이 가.\n\n### 왜 최정예가 반란을 일으켰나\n\n이괄은 인조반정에 공을 세웠는데도 2등 공신에 그쳤어. 불만을 품고 평안병사로 발령받아 변경에 나가 있던 중, 역모를 꾸민다는 무고를 당해. 자기와 아들이 무사하지 못할 거라 판단한 이괄은 압송하러 온 관리들을 죽이고 반란을 일으켜. 논공행상의 불만이 최전선 최정예 부대의 반란으로 이어진 거야.\n\n### 16,000명, 조선이 가진 유일한 정규군\n\n반란은 결국 진압되지만, 그 대가가 어마어마했어. 이괄의 난으로 손실된 북방군이 16,000명, 그중 정예병만 7,500명이야. 당시 4영군을 제외하면 조선의 정규군은 이 북방군이 사실상 유일했어. 그러니까 이괄의 난은 반란 하나를 진압한 사건이 아니라, 조선이 가진 거의 유일한 상비 정예군을 통째로 날려버린 사건이었던 거지.\n\n### 도망친 자들이 길잡이가 되다\n\n여기서 더 결정적인 사건이 하나 있어. 반란에 가담했던 한명련의 아들 한윤과 한택이 후금으로 도망쳐. 이들은 \"광해군이 부당하게 폐위됐다\"고 호소하며 \"조선의 군세가 약하니 속히 칠 것\"을 후금에 종용해. 조선의 내부 사정과 방비 상태를 가장 잘 아는 사람들이, 조선을 공격하라고 부추기는 길잡이가 된 거야.\n\n### 정묘호란, 이미 무너진 방어선\n\n1627년 후금군 3만이 조선을 침공해. 압록강을 건넌 지 보름 만에 황해도와 평안도가 통째로 넘어가. 이렇게 빨리 뚫린 이유가 정확히 나와 있어 — 평안도 지역은 이괄의 난 이후 중앙 조정의 집중적인 견제를 받으면서 병사들의 훈련도와 전쟁물자, 식량을 충분히 확보하지 못한 상태였어. 반란을 일으켰던 지역이라는 이유로 오히려 방비가 약화된 채 방치돼 있었던 거지.\n\n### 도미노가 완성되다\n\n일부 역사학자들은 이 연쇄를 이렇게 정리해 — 이괄의 난이 없었다면 정묘호란도 없었을 것이고, 정묘호란으로 조선의 물자를 확보하지 못했다면 후금은 대기근을 넘기기 더 어려웠을 것이고, 그러면 명나라를 밀어내는 데도, 이후 병자호란으로 조선을 완전히 굴복시키는 데도 훨씬 더 큰 어려움을 겪었을 거라고. 물론 이게 대륙의 주인이 바뀐 결정적 원인이라고 보기엔 무리가 있지만, 적어도 후금이 대기근이라는 최악의 위기를 조선에게서 얻은 식량으로 넘겼다는 것 자체는 사실이야.\n\n### 3부의 진짜 질문\n\n정리하면 이래. 조선은 임진왜란을 거치며 실전 경험을 쌓고, 활쏘기에 능했던 백성들이 조총의 명수가 되고, 항왜라는 예외적인 전력까지 흡수한 나라였어. 청나라에 속수무책으로 무너질 병력이 아니었던 거야. 근데 그 최정예를, 반정 세력의 논공행상 실패와 그로 인한 반란, 그리고 반란 이후의 뒤끝 있는 견제로 스스로 파괴해버렸어.\n\n이건 1부 서장부터 계속 봐온 그 패턴의 최종 형태야. 권력은 자신을 만든 힘을 의심하고 파괴한다 — 김종서, 남이, 김덕령, 이순신을 거쳐, 이번엔 아예 나라를 지킬 유일한 정규군 전체가 그 대상이 됐어. 조선은 청나라라는 외부의 적을 만나기도 전에, 이미 자기 손으로 자기 최정예를 무너뜨린 상태였던 거지.", "summary": "이괄이 지휘한 반란군은 사실 조선 최정예 북방군이었고, 그 전투력은 조정이 일본에 원병을 고려할 정도로 강력했어. 이 반란의 진압으로 조선은 16,000명(정예병 7,500명)을 잃었고, 도망친 잔당은 후금의 길잡이가 됐어. 정묘호란이 보름 만에 평안도를 뚫은 건 청나라가 강해서가 아니라, 조선이 이미 자기 손으로 최정예를 파괴했기 때문이었어.", "note": "※ 이괄의 난 병력 구성과 전투 경과, 손실 규모, 한윤·한택의 후금 투항과 정묘호란과의 연관성은 사료로 확인돼. 다만 '이괄의 난이 없었다면 청의 대륙 정복도 없었을 것'이라는 해석은 역사학계 일부의 논쟁적 견해야.", "questions": ["논공행상의 불공정함이 최정예 부대의 반란으로, 그 진압이 국가 방위력의 붕괴로 이어지는 이 연쇄, 지금 우리 조직에서도 비슷한 '작은 불공정이 부른 큰 붕괴'를 찾을 수 있을까?", "조선은 반란을 일으킨 지역(평안도)을 이후에도 계속 견제했어. 응징이 필요한 순간과, 응징이 오히려 다음 위협을 키우는 순간을 어떻게 구별해야 할까?", "\"군사력이 없어서 졌다\"와 \"군사력을 스스로 파괴해서 졌다\"는 완전히 다른 이야기인데, 우리는 왜 역사를 배울 때 전자로 더 쉽게 단순화할까?"]}, {"part": "3부", "title": "청나라를 치자던 군대가 청나라를 위해 싸웠다", "subtitle": "북벌론, 그리고 부흥하는 청나라", "body": "효종의 북벌론, 배울 때 보통 \"삼전도의 굴욕을 씻겠다는 웅장한 복수극\"으로 배우잖아. 근데 그 북벌군이 실제로 한 일을 보면, 이야기가 완전히 다른 방향으로 흘러가.\n\n### 청의 국력을 직접 본 사람이 세운 계획\n\n효종(봉림대군)은 형 소현세자와 함께 병자호란 이후 청나라 심양에 볼모로 끌려가 있었어. 중원에서 명나라가 무너지고 청나라가 천하를 차지하는 과정을 코앞에서 지켜본 사람이야. 그런 사람이 왕이 되고 나서 '북벌'을 내걸어. 근데 여기서 이상한 점 하나 — 청의 국력을 누구보다 잘 아는 사람이, 정말로 그 나라를 치겠다고 진지하게 계획했을까?\n\n역사학계 다수 견해는 '아니다'에 가까워. 효종은 적장자가 아니라 정통성이 취약한 채로 왕위에 올랐어. 북벌은 명나라를 위한 복수라는 명분으로 지지 세력(산림, 송시열 등 서인)을 결집시키고, 동시에 인조 대에 청의 통제를 받아 무너져 있던 조선의 군사체계를 재정비할 현실적 명분이었어. 훈련도감과 어영청을 늘리고, 성을 보수하고, 양반한테까지 군포를 거두려 하고 — 이건 다 진짜 개혁이었어. 근데 그 개혁의 최종 목적지가 '청나라 정벌'이었다는 증거는 약해. 형과 마찬가지로 효종도 그게 무익하다는 걸 뼈저리게 알고 있었으니까.\n\n### 아이러니 — 그 군대가 청나라를 도왔다\n\n1654년, 청나라가 조선에 파병을 요청해. 러시아(나선) 세력이 흑룡강 유역으로 남하하면서 청나라 군대가 계속 패배하고 있었거든. 청나라는 조선 조총부대의 사격 실력을 이미 알고 있었어 — 10년 전 송산 전투에서 조선군 조총병의 지원사격에 도움을 받은 적이 있었거든. 효종은 변급이 이끄는 조총군 100명을 보내. 4년 뒤인 1658년엔 신류가 이끄는 200명을 다시 보내고.\n\n결과는 대승이었어. 청나라 군대가 계속 패배하던 상대를, 조선 조총부대가 참전하자마자 격퇴시켜. 근데 이게 얼마나 아이러니한 상황이냐면 — 청나라를 치겠다며 키운 군대가, 정작 그 청나라를 위해 러시아와 싸운 거야. 심지어 조선군은 자기들이 누구랑 싸워 이겼는지도 정확히 몰랐어. 그러니 승리했는데도 마음껏 자축할 수 없는, 이상하게 뒤틀린 승전이었지.\n\n### 근데 이게 완전한 모순만은 아니었을 수도\n\n여기서 균형을 잡아볼 부분이 있어. 1차 나선정벌 당시 청나라 사신이 왔을 때, 효종은 이렇게 물었다는 기록이 있어 — \"북경의 군사력은 아직도 정예한가?\" 이건 단순히 시키는 대로 따른 게 아니라, 청나라 군대와 함께 작전을 치르면서 그 실태를 몰래 정찰하려는 의도로도 읽혀. 게다가 조선 입장에서는 이 참전이 자기 포수들의 실전 능력을 검증할 기회이기도 했어. 즉 청을 돕는 것처럼 보이는 이 행동이, 어쩌면 북벌 준비의 연장선일 수도 있었다는 거지 — 겉으로는 순응, 속으로는 정보 수집.\n\n### 부흥하는 청나라, 정지된 조선\n\n근데 이 모든 논쟁을 다 떠나서, 진짜 핵심은 이거야. 조선이 북벌을 '준비'만 하고 있는 그 시간 동안, 청나라는 명나라를 완전히 무너뜨리고 대륙을 통일하면서 역사상 손꼽히는 대제국(강희-옹정-건륭으로 이어지는 전성기)으로 나아가고 있었어. 조선의 군사력이 아무리 조총부대 몇백 명 단위로 실전 검증을 거듭해도, 그 상대는 계속 몸집을 키워가는 나라였던 거지. 격차는 좁혀지는 게 아니라 시간이 갈수록 벌어지고 있었어.\n\n### 청이 오히려 완충국이었다면\n\n여기서 생각해볼 만한 반사실적 질문이 하나 있어. 만약 병자호란에서 조선이 정말 이겼다면 어떻게 됐을까? 일부 역사가들은 청나라라는 강대국이 무너진 자리를, 당시 시베리아를 넘어 남하하던 러시아가 만주까지 집어삼켰을 가능성을 제기해. 실제로 훗날 러시아 제국이 연해주를 차지하고 만주 전체를 노렸던 걸 생각하면 터무니없는 상상은 아니야. 그러니까 조선이 그렇게 치를 떨던 청나라가, 역설적으로 훨씬 더 다루기 힘들었을 또 다른 세력(러시아)으로부터 조선을 막아주는 완충국 역할을 했을 수도 있다는 거지.\n\n### 4화의 결론\n\n북벌은 실현 가능성 없는 말뿐인 구호였어. 근데 그 구호 아래서 키운 군사력은 역설적으로 진짜였고, 실전에서 검증까지 받았어 — 다만 그 실전이 '정복'이 아니라 '청나라를 위한 용병'이었다는 게 문제였지. 명분과 실리가 완전히 뒤바뀐 거야. 겉으로는 복수를 외치면서 속으로는 그 복수 대상을 도와야 했던 나라, 그리고 그 복수 대상이 오히려 자기를 지켜주는 방패였을지도 모르는 나라 — 이게 병자호란 이후 조선이 서 있던 자리였어.", "summary": "효종의 북�벌론은 정통성이 약한 왕이 내부 결속과 군제 재정비를 위해 내건 명분에 가까웠고, 실제로 청나라를 칠 계획이었다는 증거는 약해. 그 증거로, 북벌을 위해 키운 조선 조총부대는 정작 청나라의 요청으로 러시아군과 싸워 대승을 거뒀어. 청나라는 그 시기 명을 무너뜨리고 대제국으로 부흥하고 있었고, 조선이 만약 청을 정말 무너뜨렸다면 오히려 러시아라는 더 위협적인 세력을 만났을 수도 있어.", "note": "※ 효종의 심양 볼모 경험과 북벌 정책의 성격, 나선정벌의 경과와 전과는 사료로 확인돼. 다만 북벌론이 순수한 정치적 수사였는지 진지한 장기 계획이었는지는 학계에서도 여전히 논쟁 중이야.", "questions": ["겉으로 내건 명분(북벌)과 실제로 한 행동(청나라 지원)이 정반대였는데도, 이게 완전한 위선이 아니라 나름의 전략일 수 있다는 것 — 명분과 실리가 이렇게 갈라질 때 우리는 어떻게 그 행동을 평가해야 할까?", "'적'이 사실은 나를 다른 위협으로부터 지켜주는 방패였을 수도 있다는 반사실적 상상, 지금 우리가 적대시하는 대상에도 이런 역설이 숨어있을 수 있을까?", "실현 불가능한 목표(북벌)를 내걸었던 게 오히려 실질적인 성과(군제 개혁, 조총부대의 실전 검증)로 이어졌다면, 이룰 수 없는 목표를 세우는 것에도 의미가 있는 걸까?"]}, {"part": "3부", "title": "청나라는 신생국이라 조선을 못 삼켰다", "subtitle": "신생국 청나라의 계산법", "body": "삼전도의 굴욕 이후 조선이 완전히 멸망하지 않은 걸 두고 \"홍타이지가 그래도 자비를 베풀었다\"는 식으로 말하곤 하잖아. 근데 이 서사, 진짜 이상하지 않아? 수만 대군을 이끌고 남한산성까지 밀어붙인 정복자가, 갑자기 인정을 베풀어서 왕을 살려줬다는 게.\n\n### 청은 아직 명나라도 못 무너뜨린 나라였다\n\n먼저 시점을 정확히 짚자. 병자호란은 1636~37년. 청나라가 명나라의 수도 북경을 함락시키고 진짜 대륙의 주인이 되는 건 이로부터 8년 뒤인 1644년이야. 즉 병자호란 당시 청나라는 우리가 아는 '중국을 통일한 대제국 청나라'가 아니라, 아직 명나라를 상대로 사투를 벌이고 있던 신생 세력이었어. 만주족 지도부는 불과 20~30년 전까지도 여러 부족을 주먹구구식으로 운영하던 집단이었고, 국가 재정과 조세 체계를 어떻게 꾸려야 할지도 확실한 제도가 없었어. 농경과 수렵을 겸하는 자급자족 경제였으니, 경제 발전도 크지 않았고.\n\n이런 나라가 언어도 다르고 문화도 다른 조선을 정복해서 직접 통치한다는 건, 감당하기 벅찬 과제였어. 정복은 시작에 불과하고, 그 이후 행정·조세·치안을 다 새로 짜야 하는데 그럴 여력이 없었던 거지.\n\n### 진짜 목표는 조선이 아니라 명나라였다\n\n홍타이지가 조선을 친 이유부터 다시 보자. 최우선 전략 목표는 명나라 정벌이었어. 근데 조선이 명나라와 가깝게 지내고, 특히 평안도 가도에 주둔한 명나라 장수 모문룡의 군대까지 지원하고 있었으니, 명나라를 치러 가는 사이 조선이 배후를 찌를 위험이 있었어. 그러니까 병자호란의 본질은 '조선 정복'이 아니라 '배후 안정화'였던 거야. 목표가 다르면 필요한 결과도 달라져 — 영토가 필요한 게 아니라, 조선이 다시는 명나라 편에서 뒤통수를 치지 못하게 확실히 굴복시키는 것으로 충분했던 거지.\n\n### 직접 지배의 비용을 계산해보면\n\n정복한 땅을 직접 통치하려면 관료를 심고, 군대를 상주시키고, 저항을 진압할 준비를 갖춰야 해. 이건 막대한 자원과 인력이 필요한 일이야. 근데 청나라의 진짜 목표(명나라 정벌)를 위해서는 그 모든 자원을 서쪽(명나라 방향)에 집중해야 했어. 조선까지 직접 지배하는 건, 필요하지도 않은 곳에 자원을 분산시키는 손해 보는 선택이었던 거지.\n\n반면 조공·책봉 관계(항복 + 군신 관계 + 공물)는 최소한의 비용으로 같은 효과(배후 안정)를 얻는 방법이었어. 인조를 그대로 왕위에 앉혀두고, 삼전도에서 확실하게 굴복의 의식을 치르게 하고, 매년 공물을 받고, 필요할 때 원군을 요청할 수 있는 관계 — 이게 신생국 청나라 입장에서는 훨씬 합리적인 선택이었던 거야.\n\n### 그밖의 현실적 이유들\n\n여기에 다른 요인들도 겹쳐. 만주족은 전통적으로 두창(천연두)에 취약했다고 알려져 있는데, 조선 체류 자체가 이들한테 위험 요소였을 가능성이 있어. 그리고 애초에 만주족은 몽골을 상대할 때도 직접 지배보다는 기미(羈縻)·조공 체제를 선호하는 성향이 있었어 — 굳이 다 삼키지 않고 복속만 시키는 방식에 익숙했던 거지.\n\n### 조선을 살린 건 청의 자비가 아니라 청의 처지였다\n\n정리하면 이래. 조선이 완전히 멸망하지 않은 건 홍타이지의 인정이나 관대함 때문이 아니야. 청나라가 아직 명나라도 못 무너뜨린 신생국이었고, 진짜 목표는 조선이 아니라 명나라였고, 직접 지배는 감당할 여력도 필요성도 없었기 때문이야. 조선의 굴욕(삼전도)은 확실했지만, 조선의 생존은 청나라의 선의가 아니라 청나라의 계산의 결과였던 거지.\n\n이건 좀 뒤집어 생각하면 무서운 이야기이기도 해. 만약 병자호란이 1637년이 아니라 1650년대, 청나라가 명나라를 완전히 무너뜨리고 대륙을 확실히 손에 넣은 뒤에 벌어졌다면? 그때도 조선이 항복 하나로 나라를 유지할 수 있었을지는 장담할 수 없어. 조선은 가장 위험한 순간(청나라가 아직 확립되지 않은 신생국이었던 그 짧은 시기)에 침략당했기 때문에 오히려 살아남은 걸지도 몰라.", "summary": "청나라가 병자호란 이후 조선을 멸망시키지 않은 건 홍타이지의 관대함이 아니라, 청나라 자신이 아직 명나라도 무너뜨리지 못한 신생국이었고 조선 정복보다 명나라 정벌이라는 본래 목표에 자원을 집중해야 했기 때문이야. 직접 지배의 비용을 감당할 여력이 없었던 청나라에게, 항복과 조공 관계는 최소 비용으로 배후를 안정시키는 최적의 선택이었어.", "note": "※ 병자호란 당시 청의 경제·행정 체제의 미비함과 명나라 정벌이라는 전략적 우선순위는 역사학계에서 널리 인정되는 해석이야. 다만 천연두 등 다른 요인들의 비중에 대해서는 학자들 사이에 이견이 있어.", "questions": ["'패배한 자를 살려준 승자의 자비'로 알려진 다른 역사적 사건들도, 사실은 승자 쪽의 계산이나 한계 때문이었을 가능성이 있을까?", "조선이 청나라가 가장 취약했던 시기에 침략당해서 오히려 살아남았다는 것 — 타이밍이 결과를 좌우하는 다른 역사적 사례를 찾을 수 있을까?", "우리는 왜 '승자가 자비를 베풀었다'는 서사를 '승자가 계산했다'는 서사보다 더 쉽게 받아들일까?"]}, {"part": "4부", "title": "남북전쟁의 총알이 일본을 바꿨다", "subtitle": "잉여무기, 조슈번, 그리고 대정봉환", "body": "1865년 미국 남북전쟁이 끝난다. 그리고 3년 뒤, 지구 반대편 일본에서 700년 가까이 이어진 무사 정권(막부)이 무너지고 메이지 유신이 시작된다. 이 두 사건, 그냥 시기가 겹친 우연일까?\n\n### 조슈번, 무기를 살 수 없는 처지가 되다\n\n1864년, 존왕양이(천황을 받들고 외세를 배척하자)를 주도하던 조슈번은 교토에서 벌인 쿠데타(금문의 변)가 실패하면서 막부의 정벌 대상이 돼. 제1차 조슈 정벌 이후, 막부는 조슈번의 서양 무기 구매를 봉쇄해버려. 다이묘들이 무기를 사려면 원칙적으로 막부의 허가가 필요했는데, 조슈는 그 허가를 받을 수 없는 처지가 된 거야. 신식 소총도, 신식 군함도 구할 길이 막힌 거지.\n\n### 마침 남북전쟁이 끝났다\n\n근데 정확히 이 시점에 지구 반대편에서 엄청난 사건이 벌어져. 1865년 미국 남북전쟁이 끝나면서, 양쪽 군대가 쓰던 대량의 소총이 시장에 풀린 거야. 라이플 강선총, 미니에탄을 쓰는 전장식 소총 같은 최신 화기들이 갑자기 헐값에 쏟아져 나온 거지. 이 잉여무기가 국제 무기상들의 손을 거쳐 일본으로도 대량 흘러들어와. 나가사키에 무역상을 차린 스코틀랜드 상인 토머스 블레이크 글러버가 바로 이 흐름의 중심에 있었어.\n\n### 사쓰마의 이름으로, 조슈의 무기를\n\n문제는 조슈가 이 무기를 살 자격이 없다는 거였어. 여기서 사카모토 료마가 등장해. 도사번 출신의 탈번 낭인이었던 그는 나가사키에서 가메야마샤추(훗날 해원대, 미쓰비시의 전신)라는 무역 결사를 운영하면서 글러버 상회와 총기 거래를 텄어. 료마는 사쓰마번이 제2차 조슈 정벌에 병력을 내기 꺼린다는 걸 알고, 사쓰마와 조슈 사이를 중재하기로 해. 방법은 이거였어 — 사쓰마의 이름으로 무기와 군함을 사서, 그걸 조슈로 몰래 보내는 거야. 막부의 감시망을 우회하는 방법이었지. 이 거래가 1866년 삿초동맹(사쓰마-조슈 동맹)이라는 정치적 결합으로까지 이어져.\n\n### 오합지졸이 정예군을 이기다\n\n이렇게 확보한 신식 소총으로 조슈번은 다카스기 신사쿠가 만든 기병대(奇兵隊)를 무장시켜. 이 부대가 특이한 게, 사무라이만이 아니라 농민과 상인까지 신분을 안 가리고 받아들인 혼성 부대였다는 거야. 1866년 제2차 조슈 정벌에서, 병력 규모로는 훨씬 열세였던 이 조슈군이 막부의 대군을 상대로 승리를 거둬. 신분과 격식에 얽매인 막부의 전통적인 군대가, 남북전쟁 잉여무기로 무장한 혼성 민병대한테 밀린 거지.\n\n### 무너지는 막부, 그리고 대정봉환\n\n이 패배는 막부의 권위에 결정적인 타격을 줘. \"막부도 이제 어쩔 수 없구나\"라는 인식이 다이묘들 사이에 퍼지면서, 반막부 세력의 힘이 급격히 커져. 결국 1867년, 15대 쇼군 도쿠가와 요시노부는 조슈·사쓰마 동맹의 무력 토막 움직임을 선제적으로 차단하기 위해 정권을 천황에게 돌려주는 대정봉환을 선언해. 이듬해 보신전쟁을 거쳐 막부는 완전히 무너지고, 메이지 유신이 시작돼.\n\n### 이 모든 게 왜 우리 책과 연결될까\n\n정리하면 이래. 미국에서 4년 동안 수십만 명이 죽은 전쟁이 끝나면서 남은 총들이, 국제 무기상의 네트워크를 타고 일본 서남단의 한 번(藩)으로 흘러들어갔고, 그 총이 신분을 뛰어넘은 혼성 민병대를 무장시켰고, 그 민병대가 700년 무사 정권을 무너뜨리는 결정적 계기를 만들었어. 지구 반대편의 전쟁 하나가, 완전히 다른 대륙의 정치 체제를 뒤흔든 거야.\n\n그리고 이 흐름은 여기서 끝나지 않아. 이렇게 근대화된 무기와 군사 조직으로 막부를 무너뜨린 메이지 정부는, 채 10년도 지나지 않아 그 힘을 조선으로 돌려. 1875년 운요호 사건, 1876년 강화도조약. 남북전쟁의 총알이 일본의 정권을 바꾸고, 그 바뀐 일본이 다시 조선의 운명을 흔드는 거지. 4부는 이 지점에서 시작해야 해.", "summary": "1865년 미국 남북전쟁이 끝나며 풀린 대량의 잉여 소총이 나가사키의 무역상 글러버와 사카모토 료마의 중개를 거쳐 조슈번으로 흘러들어갔고, 이 무기로 무장한 신분 혼성 민병대(기병대)가 막부의 대군을 격파했어. 이 패배가 막부 권위 붕괴의 결정타가 되어 대정봉환과 메이지 유신으로 이어졌어.", "note": "※ 조슈번의 무기 봉쇄, 남북전쟁 잉여무기의 유입, 글러버·료마의 무기 중개, 제2차 조슈 정벌의 결과와 대정봉환의 경과는 사료로 확인돼.", "questions": ["완전히 무관해 보이는 두 대륙의 사건(미국 남북전쟁과 일본 메이지 유신)이 무기 시장이라는 경로로 연결됐다는 것, 이런 '숨은 연결고리'를 지금 세계에서도 찾을 수 있을까?", "신분을 가리지 않고 조직된 조슈의 기병대가 격식을 갖춘 막부군을 이겼다는 것, 이게 조직 운영에 주는 시사점은 뭘까?", "남북전쟁의 잉여무기가 일본의 근대화를 가속했고, 그 근대화된 일본이 결국 조선을 침략하는 힘이 됐다면 — 이 연쇄의 출발점(미국의 전쟁)까지 책임을 물을 수 있을까, 아니면 각 단계는 별개로 봐야 할까?"]}, {"part": "4부", "title": "당한 사람이 더 가혹하게 되갚았다", "subtitle": "강화도조약, 페리의 각본을 베끼고 업그레이드하다", "body": "1853년 페리 제독의 흑선이 도쿄만에 나타나 일본을 개항시켰지. 그리고 22년 뒤, 일본은 운요호를 조선 앞바다에 보내 똑같은 각본을 실행해. 근데 자세히 뜯어보면 일본이 조선한테 써먹은 조건이, 자기가 미국한테 당한 것보다 한 수 더 나아간 데가 있어.\n\n### 각본은 똑같았다\n\n1875년, 운요호가 강화도 초지진에 접근해서 조선 수비병의 정당한 경고 포격을 유도해. 이걸 빌미로 일본은 영종도에 상륙해서 살육과 약탈, 방화를 저지르고 철수해. 이듬해 이 무력시위를 명분 삼아 조선에 개항을 강요하는 거야. 우리역사넷은 이걸 정확히 짚어 — \"일본은 미국의 군함외교에 의해 문호를 개방했던 자신의 역사적 경험을 역으로 이용해서, 조선을 개항하기 위해 계획적으로 운요호 사건을 일으켰다.\" 당한 방식을 그대로 재현한 거지.\n\n### 그런데 한 군데 더 나아갔다\n\n조약 내용을 보면 흥미로운 지점이 있어. 강화도조약(정식명칭 조일수호조규)에는 관세에 관한 규정이 아예 없어. 조선 정부가 근대적 조약 형식에 생소해서 이걸 조약문에 넣지 못한 거야. 미일수호통상조약(1858)만 해도 불평등하긴 했지만 최소한의 관세 규정은 있었거든. 근데 강화도조약은 그마저도 없어서, 일본은 사실상 무관세로 조선과 교역할 수 있었어. 페리가 얻어낸 것보다 한 걸음 더 나간 조건인 거지.\n\n여기에 치외법권(일본인이 조선에서 범죄를 저질러도 조선 법이 아니라 일본 관원이 심판)과 해안 측량권까지 더해져. 특히 조약 1조에 \"조선은 자주국\"이라는 문구를 일부러 넣은 게 눈에 띄어. 이건 단순한 선언이 아니라, 청나라의 종주권 주장을 미리 차단하려는 치밀한 외교적 포석이었어. 일본 자신은 청나라의 조공국이 아니었으니 페리가 이런 조항을 넣을 필요가 없었지만, 조선은 청과 사대 관계였으니 일본이 훗날 조선에 개입할 명분을 미리 깔아둔 거야.\n\n### 다만 균형 잡을 부분\n\n여기서 과장하지 말아야 할 지점도 있어. 강화도조약을 같은 시기 다른 불평등조약들 — 미일수호통상조약, 시모노세키조약, 난징조약 — 과 비교하면, 오히려 상대적으로 덜 가혹한 조항도 있다는 시각이 학계에 존재해. 그러니까 \"일본이 모든 면에서 더 악랄했다\"고 단순화하긴 어려워. 대신 정확히 짚어야 할 건 이거야 — 일본은 자기가 겪어본 그 각본의 약점(관세 규정 누락)과 강점(자주국 조항을 통한 종주권 차단)을 정밀하게 파악해서, 자기 필요에 맞게 업그레이드해서 썼다는 것.\n\n### 당해본 사람이 더 잘 써먹는다\n\n여기서 핵심 통찰은 이거야. 일본은 22년 전 자기가 당했던 그 경험을, 상대(조선)의 무지(근대 조약 형식에 대한 무경험)와 자기만의 전략적 필요(청과의 종주권 경쟁)에 맞춰 정밀하게 재설계했어. 페리는 일본을 몰랐던 상태에서 힘으로 밀어붙였지만, 일본은 강화도조약을 맺을 땐 이미 '당해본 경험'과 '동아시아 국제질서에 대한 이해'를 둘 다 갖춘 상태였어. 피해자가 가해자로 전환될 때, 단순히 같은 폭력을 반복하는 게 아니라 그 폭력을 더 정교하게 다듬어서 휘두르는 경우가 있다는 거지.\n\n1화에서 본 남북전쟁 잉여무기가 일본의 정권을 바꾼 지 채 10년도 안 돼서, 그 바뀐 일본은 자기가 당한 방식 그대로, 그러나 더 치밀하게, 조선을 겨눴어.", "summary": "강화도조약은 일본이 22년 전 페리에게 당한 방식을 그대로 조선에 재현한 것이지만, 관세 규정을 아예 빼고 '조선은 자주국'이라는 문구로 청의 종주권을 미리 차단하는 등 자기 경험을 정밀하게 업그레이드해서 활용한 조약이었어. 다만 다른 불평등조약들과 비교하면 상대적으로 덜 가혹한 조항도 있다는 시각도 있어 균형 있게 봐야 해.", "note": "※ 운요호 사건의 경과와 강화도조약의 조항(관세 부재, 치외법권, 해안측량권, 자주국 조항)은 사료로 확인돼. 다만 다른 불평등조약과의 상대적 가혹함 비교는 학계에서도 견해가 갈려.", "questions": ["피해자가 가해자가 될 때, 단순 반복이 아니라 더 정교한 형태로 폭력을 재현하는 경우 — 국제관계 말고 개인관계나 조직 문화에서도 이런 패턴을 본 적 있어?", "'조선은 자주국'이라는 문구가 실제로는 조선을 위한 게 아니라 청을 겨냥한 외교 술수였다는 것 — 겉으로는 상대를 위하는 것처럼 보이는 조항이 실은 다른 목적을 감추는 경우, 지금도 있을까?", "강화도조약을 다른 불평등조약과 비교해 \"생각보다 덜 가혹했다\"고 보는 시각, 이게 역사적 평가를 완화하는 데 사용될 수 있을까 위험은 없을까?"]}, {"part": "4부", "title": "조슈번 같은 곳이 조선엔 없었다", "subtitle": "메이지유신과 갑오개혁, 세 가지 격차의 뿌리", "body": "메이지유신이 1868년, 갑오개혁이 1894년. 26년 차이야. 그 26년 동안 일본은 이미 산업화를 마치고 청나라를 상대로 전쟁까지 치를 힘을 갖췄어. 근데 이 시차, 단순히 \"늦었다\"로 끝날 문제가 아니야. 왜 늦을 수밖에 없었는지 파보면 진짜 이야기가 나와.\n\n### 희생의 규모부터 비교해보자\n\n갑신정변(1884), 조선 최초로 메이지유신을 본떠 위로부터 개혁을 시도한 사건이야. 근데 규모를 보면 초라해. 주도 세력은 평균 나이 25세도 안 되는 청년들 — 서재필은 겨우 19세였어. 동원한 병력은 조선인 개화파 50여 명에 일본군 200명이 전부. 상대는 원세개가 이끈 청나라군 1,500명. 사흘 만에 진압돼. 홍영식과 박영교는 청군과 싸우다 전사했고, 김옥균은 일본으로 망명했다가 결국 상하이에서 암살당해 시신이 능지처참됐어. 그의 양부는 6~7년 옥살이하다 죽고, 생부와 동생은 옥사하고, 어머니와 여동생은 자결하고, 아내와 딸은 노비가 됐어. 연좌제로 온 가족이 함께 파멸한 거지.\n\n일본은 어땠을까. 1853년 페리가 온 뒤부터 1868년 메이지유신까지, 15년 동안 전국 각지의 번(조슈, 사쓰마, 도사 등)에서 수많은 하급 사무라이(지사)들이 존왕양이 운동, 막부와의 무력 충돌, 각종 정변과 암살 속에서 목숨을 걸었어. 이건 한 번의 사흘짜리 쿠데타가 아니라 15년에 걸쳐 여러 지역에서 누적된 희생이었어.\n\n### 왜 이렇게 규모가 다를까 — 진짜 원인\n\n여기서 표면적인 답(\"일본인이 더 용감했다\")을 넘어야 해. 진짜 차이는 정치 구조에 있어. 에도시대 일본은 막부 아래 각 번이 준독립적으로 자기 영지, 자기 재정, 자기 군대를 갖고 있던 봉건적 분권 체제였어. 그러니까 조슈번은 막부 몰래 자기 군대를 근대화하고, 자기 무역상(글러버)과 거래하고, 자기 병력(기병대)을 키울 수 있었어. 이게 1화에서 본 남북전쟁 잉여무기가 조슈로 흘러들어갈 수 있었던 이유야 — 번이라는 독립적 단위가 있었으니까.\n\n조선은 달라. 1부에서 계속 봤던 그 이야기 기억나? 정도전의 사병혁파부터 시작해서, 조선은 지방에 독립적인 군사·재정 기반이 생기는 걸 원천적으로 차단해온 나라야. 그러니까 조선에는 '조슈번' 같은 존재가 없었어. 개혁을 하려는 세력이 있어도, 그들은 자기 군대도 자기 무역 루트도 없이 오직 중앙 권력(고종)이나 외세(일본)에 의존해야만 움직일 수 있었어. 갑신정변이 조선 독자적 병력이 아니라 일본군 200명에 의존해야 했던 이유가 바로 이거야.\n\n### 무기 통로의 차이도 같은 뿌리\n\n무기 수입 경로도 마찬가지야. 조슈와 사쓰마는 나가사키의 글러버 상회와 직접, 심지어 막부 몰래 거래할 수 있었어. 분권 체제였으니까 여러 통로가 동시에 존재할 수 있었던 거지. 조선은 모든 대외 교섭이 중앙 정부를 거쳐야 했고, 그마저도 청나라와의 사대 관계 안에서 제약을 받았어. 별기군(1881)처럼 신식 군대를 만들려는 시도가 있긴 했지만, 이것도 중앙정부 단일 채널로 추진되다가 구식 군인들의 반발(임오군란, 1882)로 무너져. 분산된 여러 실험이 아니라, 하나의 시도가 무너지면 그걸로 끝인 구조였던 거야.\n\n### 갑오개혁이 왜 이식된 개혁이었나\n\n그러니까 갑오개혁(1894)은 메이지유신처럼 내부에서 15년간 축적된 희생과 실험 끝에 폭발한 개혁이 아니야. 청일전쟁에서 일본이 승리하면서, 그 승전국이 위에서 아래로 밀어붙인 개혁이었어. 조선 내부에 그런 개혁을 자생적으로 만들어낼 분권적 기반 자체가 없었으니까, 결국 외세의 승리라는 외부 충격에 기대야 했던 거지.\n\n### 세 가지가 사실 하나였다\n\n정리하면 이래. 시기가 늦은 것, 희생의 규모가 작았던 것, 무기 수입 통로가 없었던 것 — 이 세 가지는 별개의 원인이 아니라 하나의 뿌리에서 나온 세 개의 가지야. 그 뿌리는 조선이 500년 가까이 유지해온 강력한 중앙집권 체제, 그리고 그 체제가 원천 차단해온 지방의 독립적 군사·경제 기반이야. 일본은 봉건적 분권 덕분에 조슈 같은 번이 15년에 걸쳐 실험하고 희생하고 축적할 수 있었고, 조선은 그럴 수 있는 '조슈번'이 애초에 존재하지 않았던 거지.", "summary": "메이지유신과 갑오개혁의 격차(시기, 희생 규모, 무기 통로)는 사실 하나의 원인에서 나왔어. 일본은 봉건적 분권 체제 덕분에 조슈·사쓰마 같은 번이 15년간 독자적으로 힘을 키우고 희생을 축적할 수 있었지만, 조선은 강력한 중앙집권 체제 때문에 그런 독립적 기반이 애초에 없었어. 그래서 갑신정변은 외세(일본)에 의존한 사흘짜리 쿠데타로 끝났고, 갑오개혁은 청일전쟁이라는 외부 충격에 의해 위에서 이식된 개혁이 될 수밖에 없었어.", "note": "※ 갑신정변의 규모와 결과, 김옥균 일가의 연좌 처벌, 일본 지사들의 15년간의 희생, 메이지유신의 분권적 기반은 사료로 확인돼.", "questions": ["중앙집권이 항상 강함을 의미하지 않고, 오히려 위기 대응력을 떨어뜨릴 수도 있다는 것 — 지금 우리 조직(회사, 학교, 국가)에서도 지나친 중앙집권이 오히려 변화 대응을 막는 사례가 있을까?", "갑신정변의 청년들(19세, 25세)이 감당한 희생의 무게, 그리고 그게 3일 만에 실패로 끝났다는 것 — 이 실패를 '무모함'으로 볼지 '불가피한 구조적 한계'로 볼지, 어느 쪽이 더 정확한 평가일까?", "분권적 구조(여러 번이 독자적으로 실험)와 중앙집권적 구조(하나의 시도가 실패하면 끝) 중, 변화와 혁신이 필요한 시기엔 어느 쪽이 유리할까?"]}, {"part": "4부", "title": "대원군은 사실 배우려고 했다", "subtitle": "대원군의 쇄국, 진짜 실패는 200년 전에 이미 정해져 있었다", "body": "대원군의 쇄국정책을 \"근대화를 늦춘 고집불통 정책\"으로 배우잖아. 근데 병인양요 이후 대원군이 실제로 한 일을 보면, 이 통설은 절반만 맞는 이야기야.\n\n### 대원군은 사실 배우려고 했다\n\n1866년 병인양요에서 프랑스군의 화력을 직접 겪은 대원군은, 김윤식의 건의를 받아들여 신헌·신관호한테 서양식 무기 개발을 지시해. 참고 자료는 청나라에서 들여온 『해국도지』, 서양의 무기 제작법이 그림으로 설명된 책이었어. 착수한 지 6개월 만에 전함 3척과 수뢰포(수중 기뢰)를 완성시켜. 1867년 노량진에서 고종과 함께 진수식과 시험발사를 참관했는데, 수뢰포는 실제로 큰 배를 격파할 정도의 위력을 보였어. 방탄복 역할을 하는 면제배갑도 이때 개발돼.\n\n즉 \"쇄국이라 배우기를 거부했다\"는 통념과 달리, 대원군은 서양의 군사기술을 실제로 흡수하려 했고, 결과물까지 만들어냈어. 문을 걸어 잠근 채로 대장간을 돌리고 있었던 거지.\n\n### 근데 뇌관 하나를 못 만들었다\n\n문제는 여기서 시작돼. 수뢰포를 터뜨리려면 뇌관(퍼커션 캡)이 필요한데, 조선은 이걸 자체 생산할 수 없어서 청나라에서 수입해야 했어. 정교한 화학 반응을 이용하는 이 작은 부품 하나를 만들 화학·금속가공 기반이 조선에는 없었던 거야. 무기의 설계도는 확보했는데, 그걸 현실에서 대량으로 찍어낼 산업 기반 자체가 없었던 거지. 결국 대원군의 신무기 개발은 시제품 단계에서 멈추고, 대량생산으로 이어지지 못해.\n\n### 그러면 진짜 질문은 이거다\n\n여기서 \"문을 열었어야 했나\"라는 질문 자체를 다시 봐야 해. 문을 열었다고 저절로 해결됐을까? 아니야. 진짜 물어야 할 질문은 — 닫혀 있던 200년 동안, 조선은 무엇을 쌓고 있었나야.\n\n일본을 다시 보자. 에도 막부도 '쇄국'이었어. 근데 완전히 닫힌 게 아니라, 나가사키 데지마라는 단일 창구를 통해 200년 동안 네덜란드와 제한적으로 교역했어. 이 창구를 통해 난학(蘭學)이라는 서양 과학기술 번역·연구 전통이 꾸준히 쌓였어. 의학, 천문학, 물리학 서적들이 번역되고 연구됐지. 그러니까 1853년 페리가 왔을 때, 일본은 서양을 '처음 보는' 나라가 아니라 '200년치 축적된 지식을 실전에 쏟아낼 준비가 된' 나라였던 거야.\n\n조선은 이런 창구가 없었어. 대원군이 참고한 게 청나라 책 한 권이었다는 사실 자체가, 조선에는 그런 지속적 학습 인프라가 애초에 존재하지 않았다는 증거야. 급하게 벼락치기로 서양 기술을 흡수하려 해도, 200년치 기초가 없으니 뇌관 하나 앞에서 멈춰버리는 거지.\n\n### 실패는 1866년이 아니라 훨씬 전에 이미 정해졌다\n\n그러니까 대원군의 진짜 실패는 '문을 닫은 것'이 아니야. 그건 오히려 결과물이었어. 진짜 실패는, 조선이 200년 동안 단 한 번도 일본의 데지마 같은 '관리된 창구'를 만들 생각을 하지 않았다는 거야. 위기가 닥친 1866년에 부랴부랴 서양 기술을 배우려 해도, 그걸 받아낼 기초 지식과 산업 기반이 없으면 결국 뇌관 하나를 놓고 좌절하게 되는 거지.\n\n이건 이 책 전체에서 계속 봐온 패턴의 또 다른 얼굴이야. 위협이 닥쳐야 허둥지둥 대응하고, 평소에는 그 대응력을 쌓아두지 않는 것. 정도전의 사병혁파부터, 세종의 화약무기가 문종의 요절로 끊긴 것부터, 이번엔 그 패턴이 '지식과 기술의 축적'이라는 영역에서 반복된 거야. 대원군은 나쁜 선택을 한 게 아니라, 200년 전에 이미 끝난 게임을 뒤늦게 되돌리려 한 거였어.", "summary": "대원군은 병인양요 이후 실제로 서양 무기 기술을 흡수하려 했고, 수뢰포와 전함까지 완성시켰어. 하지만 뇌관 하나조차 자체 생산할 산업 기반이 없어서 대량생산에 실패했어. 진짜 문제는 '문을 닫았다'가 아니라, 조선이 200년 동안 일본의 데지마 같은 지속적 학습 창구를 만든 적이 없었다는 거야. 급하게 배우려 해도 받아낼 기초가 없었던 거지.", "note": "※ 대원군의 수뢰포·전함 개발 경과, 뇌관 수입 의존, 일본의 데지마·난학 전통은 사료로 확인돼.", "questions": ["'위기가 닥쳐야 배우기 시작하는 것'과 '평소에 조용히 창구를 열어 축적하는 것' — 이 두 방식의 차이를 지금 우리 학교나 조직의 대응 방식에도 적용해볼 수 있을까?", "일본의 난학처럼, 지금 우리 사회에 '작지만 200년을 내다보는 지식 축적 창구'가 있다면 어떤 형태일까?", "결과(뇌관을 못 만든 것)만 보면 실패로 보이지만, 과정(6개월 만에 전함과 수뢰포를 완성한 것)만 보면 놀라운 성과야. 역사를 평가할 때 우리는 결과와 과정 중 어느 쪽에 더 무게를 둬야 할까?"]}, {"part": "4부", "title": "미화가 잘못된 진짜 이유", "subtitle": "순교자 서사가 가리는 훨씬 불편한 진실", "body": "명성황후, 국모의 이미지로 기억되잖아. 근데 진령군에게 인사권을 넘기고, 당오전을 남발해 백성 재산을 갈취하고, 조선 역사상 처음으로 과거 합격증까지 팔아먹은(매과) 기록이 『매천야록』과 실록에 그대로 남아있어. 지석영 같은 신하가 목숨 걸고 탄핵 상소를 올려도 묵살당했지. 이 부패는 소문이 아니라 사실이야.\n\n### \"죽어 마땅했다\"는 함정\n\n근데 여기서 흔히 빠지는 함정이 있어. \"부패했다\"에서 \"그러니 암살당해 마땅했다\"로 건너뛰는 거야. 이 논리, 사실 을미사변을 저지른 일본 쪽이 사후에 만든 정당화 논리와 구조가 똑같아. 일본은 그녀를 친러 성향으로 자기들 대륙 진출을 방해한다는 이유로 죽였고, 그 뒤에 \"사실 이 여자는 나라를 망친 부패한 여자였다\"는 서사를 덧붙였어. 흥미로운 건 그녀가 죽기 직전, 이노우에 가오루가 제시한 친일 협조 대가의 거액 뇌물을 거부했다는 기록도 있다는 거야. 진짜 이유는 \"부패해서\"보다 \"일본 말을 안 들어서\"에 더 가까웠을 수 있어.\n\n### 조선은 스스로 처벌할 수 있었을까\n\n그러면 \"조선인의 손으로 단죄했어야 한다\"는 주장은 성립할까. 실제로 그 시도가 있었어. 갑신정변(1884)이야. 김옥균, 박영효 같은 급진 개화파가 민씨 척족 요인들을 축출하고 새 정권을 세우려 했어. 근데 사흘 만에 청나라군 1,500명한테 진압당했고, 김옥균은 일가족이 연좌로 몰살당했어.\n\n조선인이 시도 안 한 게 아니야. 시도했는데 실패한 거야. 왜 실패했을까 — 4부 3화에서 본 이유 그대로야. 조선엔 이런 시도를 뒷받침할 독립적 권력 기반(일본의 조슈번 같은)이 없었어. 쿠데타 세력은 외세(일본)의 힘을 빌려야 했고, 그 외세가 발을 빼자마자 또 다른 외세(청)한테 짓밟혔지.\n\n### 동학농민군조차 가지 못한 길\n\n그럼 밑에서부터의 혁명은 어땠을까. 동학농민운동(1894)은 인내천(사람이 곧 하늘)이라는, 신분을 초월하는 급진적 사상을 갖고 있었어. 근데 전주성을 점령했을 때도 왕조 자체를 부정하지 않았어. 전주화약에서 내건 요구(폐정개혁안)는 탐관오리 처벌과 삼정 개혁이었지 \"왕정을 없애자\"가 아니었어. 전봉준은 흥선대원군과도 접촉하면서, \"부패한 척족을 몰아내고 올바른 정치를 되찾자\"는 유교적 정치 언어 안에서 움직였어.\n\n비슷한 시기 청나라의 태평천국운동(1850~64)은 정확히 왕조를 부정하고 새 나라를 세워 15년간 독자 정권을 운영했는데, 동학은 그 단계까지 안 갔어. 급진적 사상은 있었는데, 그걸 급진적 정치 목표로 옮길 다리가 없었던 거야.\n\n### 진짜 문제는 그녀가 아니라 우리였다\n\n네 가지를 합쳐보자. 부패는 실재했다. 그런데 그 처벌을 국가 스스로 실행할 합법적 통로가 없었다(왕이 곧 공범이었으니까). 쿠데타로 처단하려던 시도는 있었지만 구조적으로 실패했다. 밑으로부터의 혁명조차 왕정 타도까지는 나아가지 못했다.\n\n이 네 가지가 가리키는 결론은 하나야. 명성황후 미화가 잘못된 진짜 이유는 그녀가 죽어 마땅해서가 아니야. 그 미화 서사가 훨씬 불편한 진실을 가리기 때문이야 — 조선은 부패한 최고 권력자를 스스로 청산할 능력이 구조적으로 없었고, 결국 그 청산이 외세의 손에 맡겨졌다는 진실. 국모 순교 서사는 감동적이지만, 그 감동 뒤에는 \"우리에게 그럴 힘이 없었다\"는 더 아픈 사실이 숨어있어.\n\n이건 1부 서장부터 이 책 전체가 추적해온 그 질문의 마지막 얼굴이야. 조선은 자신을 만든 힘(사병, 화기, 백성의 무력)을 끊임없이 의심하고 억눌러온 나라였고, 그 결과 정작 자기 안의 부패를 도려낼 힘조차 남겨두지 않았어. 명성황후 한 사람의 문제가 아니라, 500년 동안 누적된 그 설계의 마지막 청구서였던 거지.", "summary": "명성황후의 부패(진령군 인사농단, 당오전 남발, 매과)는 사실이지만, '그러니 암살이 정당했다'는 논리는 을미사변을 저지른 쪽의 사후 정당화 서사를 물려받는 것일 수 있어. 조선 스스로 그녀를 단죄하려던 시도(갑신정변)는 구조적으로 실패했고, 동학농민운동조차 왕정 타도까지는 나아가지 못했어. 미화가 잘못된 진짜 이유는 그녀가 죽어 마땅해서가 아니라, 조선이 스스로 부패를 청산할 능력이 없었다는 훨씬 불편한 진실을 그 미화가 가리기 때문이야.", "note": "※ 진령군의 국정 개입, 당오전과 매과, 갑신정변의 실패, 전주화약의 요구조건은 사료로 확인돼. '조선의 구조적 무능이 미화 서사가 가리는 핵심'이라는 결론은 이 대화에서 도출한 해석이야.", "questions": ["부패한 권력자를 스스로 처벌하지 못하고 외세나 극단적 방법에 의존하게 되는 것, 지금 우리 사회의 제도(탄핵, 사법체계)는 이 문제를 얼마나 해결했을까?", "급진적 사상(인내천)과 급진적 정치 목표(왕정 타도) 사이에 다리가 없었다는 것 — 사상과 행동 사이의 이 간극은 지금 우리 사회운동에서도 볼 수 있을까?", "\"미화는 잘못됐다\"는 같은 결론에 도달해도, 그 이유를 \"그녀가 나빠서\"로 볼 때와 \"우리 시스템이 무력해서\"로 볼 때, 역사 교육이 학생들에게 남기는 메시지는 어떻게 달라질까?"]}, {"part": "4부", "title": "나라 없이 이룬 전쟁", "subtitle": "독립군의 무장투쟁, 국가 없이 이룬 군대", "body": "앞서 안중근을 놓고 \"전쟁이냐 테러냐\"를 다퉜잖아. 헤이그 육전법규의 네 가지 조건(지휘책임자, 식별 표장, 공공연한 무기 휴대, 전쟁법규 준수) 앞에서 안중근의 개인 저격은 계속 애매한 자리에 걸렸어. 근데 봉오동과 청산리로 넘어가면, 이 조건표를 다시 대볼 필요가 거의 없어져. 답이 너무 명백하거든. 이건 조직된 군대와 조직된 군대가 붙은, 누가 봐도 전쟁이야.\n\n### 나라 없이 세운 사관학교\n\n1911년부터 1920년까지, 만주 신흥무관학교에서만 3천 명 넘는 무관이 배출돼. 나라는 1910년에 이미 사라졌는데, 그 사라진 나라의 국민들이 스스로 사관학교를 세우고 지휘 체계를 갖춘 거야. 헤이그 조건의 첫 번째, \"책임 있는 지휘관 아래 조직된 부대\" — 이게 국가 없이도 만들어질 수 있다는 걸 신흥무관학교가 실물로 증명한 셈이지.\n\n### 이번엔 우리가 잉여무기를 손에 넣을 차례였다\n\n근데 훈련받은 사람이 있어도 무기가 없으면 소용없잖아. 여기서 4부 1화에서 본 그 패턴이 다시 등장해. 남북전쟁 끝난 미국의 잉여무기가 조슈번을 무장시켰다고 했지. 이번엔 다른 전쟁의 잉여무기가 독립군을 무장시켜.\n\n체코슬로바키아 군단이라는 부대가 있었어. 원래 러시아군 소속으로 오스트리아-헝가리 제국(체코를 식민 지배하던 나라)과 싸우던 사람들인데, 러시아 혁명과 내전이 터지면서 시베리아 횡단철도를 장악한 채 고립돼. 조국 체코슬로바키아가 독립하자 귀국을 준비하는데, 블라디보스토크에서 배를 기다리는 동안 소련 적군과 휴전 협정이 성립되면서 갖고 있던 무기가 갑자기 쓸모없어져. 이 무기, 원래는 러시아가 미국 레밍턴사와 웨스팅하우스사에 주문했던 모신나강 소총이야. 혁명으로 절반도 못 받고 시베리아에 남아있던 물량이었지.\n\n독립군은 이 기회를 놓치지 않아. 북간도의 거부 최운산, 연해주의 최재형이 협상에 나서서 모신나강 소총 1,200정, 기관총 6정, 탄약 80만 발, 박격포 2문을 사들여. 근데 자금으로 마련했던 루블화가 혁명으로 그냥 휴지 조각이 돼버려. 그러자 동포들이 은비녀와 금가락지, 놋쇠 요강까지 팔아서 부족분을 메워. 총 한 자루 값이 노동자 1년 치 임금이었다는 기록이 있으니, 이 무기 하나하나에 얼마나 많은 사람의 희생이 담겼는지 짐작이 가지.\n\n### 압도적인 승리\n\n이렇게 무장한 독립군의 전투력은 확실히 달랐어. 1920년 6월 봉오동 전투. 홍범도가 이끄는 대한북로독군부가 일본군 월강추격대대를 봉오동 골짜기로 유인해서 삼면에서 포위 사격을 가해. 결과는 일본군 전사 157명, 독립군 전사 4명. 임시정부 기관지 독립신문은 이걸 \"독립전쟁 제1차 대승리\"라고 선언해.\n\n같은 해 10월 청산리 전투. 김좌진의 북로군정서와 홍범도의 대한독립군이 연합해서 열흘 가까이 이어진 전투에서 일본군에 큰 타격을 줘. 일본군은 이 두 패배에 큰 충격을 받고, 간도 지역 전체를 초토화하는 보복 작전(경신참변)에 나서게 돼.\n\n### 전쟁의 요건을 채운 유일한 방식\n\n여기서 안중근 얘기로 돌아가보자. 헤이그 조건으로 안중근의 행위를 판단하려 하면 계속 걸리는 지점들이 있었잖아. 근데 봉오동과 청산리는 이 조건을 하나씩 다 채워. 지휘관(홍범도, 김좌진)이 있고, 부대 편제(대한북로독군부, 북로군정서)가 있고, 정규 병력이 전선에서 총격전을 벌였고, 민간인이 아니라 일본 정규군과 교전했어. 안중근의 개인 저격이 \"전쟁이냐 테러냐\"로 계속 다퉈야 하는 자리에 있었다면, 봉오동과 청산리는 애초에 그 논쟁이 필요 없는 자리에 있는 거야.\n\n근데 이 완결된 \"전쟁\"조차, 국가라는 틀 없이 만들어졌다는 게 진짜 놀라운 지점이야. 나라가 있어야 군대를 만들 수 있다는 상식을, 신흥무관학교와 봉오동·청산리가 그대로 뒤집은 거지.\n\n### 국가가 사라지자 오히려 억눌림도 사라졌다\n\n1부부터 계속 봐온 패턴, 기억나? 조선이라는 국가는 사병을 혁파하고, 화약무기를 가두고, 백성의 무력을 끊임없이 의심해온 나라였어. 근데 1910년, 그 국가 자체가 사라져. 그리고 아이러니하게도, 국가가 사라진 바로 그 자리에서 민간의 무력이 만개해. 국가라는 틀이 없어지니까 그 틀이 억눌러온 것들 — 독자적 군사훈련, 독자적 무기 조달, 독자적 국제 네트워크 — 이 오히려 자유롭게 움직이기 시작한 거야.\n\n물론 이건 승리가 아니라 비극의 다른 얼굴이야. 나라가 있었다면 애초에 필요 없었을 일들이니까. 근데 적어도 이 장면 하나는 분명해. 국가가 500년 동안 의심하고 가둬온 바로 그 백성의 힘이, 나라가 사라진 순간에도 스스로 총을 구하고 학교를 세우고 전쟁의 요건을 완벽히 채운 전투에서 승리를 만들어냈어. 조선이 그토록 두려워했던 그 힘이, 사실 처음부터 나라를 구할 수 있는 힘이었다는 걸 마지막에 증명한 셈이지.", "summary": "1920년 봉오동·청산리 전투는 신흥무관학교가 길러낸 지휘 체계와, 러시아 내전 후 쓸모없어진 체코군단의 무기가 만나 이뤄낸 압도적 승리였어. 안중근의 개인 저격이 '전쟁인가 테러인가' 계속 다퉈야 했던 것과 달리, 이 조직된 전투는 헤이그의 전쟁 요건을 자연스럽게 채웠어. 나라가 사라진 자리에서, 국가가 500년간 억눌러온 백성의 무력이 스스로 조직되고 무장해 완전한 전쟁을 치러낸 거야.", "note": "※ 신흥무관학교의 규모, 체코군단의 무기 판매 경위와 수량, 봉오동·청산리 전투의 전개는 사료로 확인돼. 다만 일본군 사상자 수 등 구체적 전과는 자료마다 편차가 있어.", "questions": ["국가가 사라지자 오히려 민간의 힘이 자유롭게 조직됐다는 이 역설, 지금 우리 사회에서도 '억누르던 틀이 사라지자 오히려 힘이 폭발하는' 비슷한 사례를 찾을 수 있을까?", "안중근의 개인 저격과 봉오동·청산리의 조직 전투, 같은 독립운동인데 국제법적 지위가 이렇게 갈린다는 것 — 이 차이가 역사적 평가에도 그대로 이어져야 할까?", "이 책 1부부터 계속 본 '국가가 백성의 무력을 두려워한다'는 패턴이, 나라를 잃고 나서야 그 두려움의 대상이었던 힘이 나라를 되찾으려는 힘으로 증명됐다면 — 이건 이 책 전체에 어떤 결론을 던질까?"]}];
const PART_TITLES = {"1부": "화약을 잊은 나라", "2부": "격차의 충격", "3부": "청, 그리고 오판의 연쇄", "4부": "19세기, 서구의 충격"};
const PART_RANGES = {"1부": [1, 5], "2부": [6, 14], "3부": [15, 19], "4부": [20, 25]};
const PART_ORDER = ["1부", "2부", "3부", "4부"];

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderTocInline(){
  const el = document.getElementById("tocInline");
  let html = "";
  PART_ORDER.forEach(part=>{
    const [start,end] = PART_RANGES[part];
    html += `<div class="part-label">${part} — ${PART_TITLES[part]||""} (${start}화 ~ ${end}화)</div>`;
    for(let i=start;i<=end;i++){
      const c = CHAPTERS[i];

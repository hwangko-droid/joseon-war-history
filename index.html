      html += `<div class="toc-card" data-idx="${i}">
        <div class="num">${i}화</div>
        <div class="t">${esc(c.title)}</div>
        <div class="s">— ${esc(c.subtitle)} —</div>
        <hr>
        <div class="go">읽기 시작 →</div>
      </div>`;
    }
  });
  el.innerHTML = html;
  el.querySelectorAll(".toc-card").forEach(item=>{
    item.addEventListener("click", ()=> openChapter(parseInt(item.dataset.idx)));
  });
}

function paraHtml(body){
  return body.split(/\n\n+/).map(block=>{
    const t = block.trim();
    if(t.startsWith("### ")){
      return `<h3>${esc(t.replace(/^###\s*/,""))}</h3>`;
    }
    return `<p>${esc(t)}</p>`;
  }).join("");
}

async function loadNote(idx){
  try{ if(window.storage){ const r = await window.storage.get("note-"+idx, false); return r?r.value:""; } }catch(e){}
  try{ return localStorage.getItem("joseon-note-"+idx) || ""; }catch(e){ return ""; }
}
async function saveNote(idx, val){
  try{ if(window.storage){ await window.storage.set("note-"+idx, val, false); return; } }catch(e){}
  try{ localStorage.setItem("joseon-note-"+idx, val); }catch(e){}
}

async function openChapter(idx){
  const c = CHAPTERS[idx];
  document.getElementById("view-cover").classList.add("hidden");
  const el = document.getElementById("view-chapter");
  el.classList.remove("hidden");

  let qHtml = "";
  if(c.questions && c.questions.length){
    qHtml = `<div class="q-box"><div class="lbl">같이 생각해보자</div>` +
      c.questions.map(q=>`<div class="q-item">${esc(q)}</div>`).join("") + `</div>`;
  }
  let sumHtml = "";
  if(c.summary){
    sumHtml = `<div class="summary-box">
      <div class="lbl">한 줄 요약</div>
      <p>${esc(c.summary)}</p>
      <div class="note">${esc(c.note||"")}</div>
    </div>`;
  }
  const metaLabel = c.part==="서문" ? "서문" : `${c.part} · ${idx}화 / ${CHAPTERS.length-1}화`;

  el.innerHTML = `
    <div class="ch-meta">${metaLabel}</div>
    <div class="ch-title">${esc(c.title)}</div>
    <div class="ch-sub">— ${esc(c.subtitle)} —</div>
    <div class="prose">${paraHtml(c.body)}</div>
    ${sumHtml}
    ${qHtml}
    <div class="note-box">
      <div class="lbl">우리 동아리의 생각과 기록장</div>
      <textarea id="noteArea" placeholder="추리의 허점이나 사료 간 불일치를 발견하고 역사적인 의심을 펼쳐 기록해보세요..."></textarea>
      <div class="save-hint">작성하신 기록은 브라우저 공간에 자동으로 보관됩니다.</div>
    </div>
    <div class="nav-row">
      <button id="prevBtn" ${idx===0?"disabled":""}>← 이전 화</button>
      <span class="toc-link" id="tocLink">전체 목차</span>
      <button id="nextBtn" ${idx===CHAPTERS.length-1?"disabled":""}>다음 화 →</button>
    </div>
  `;

  const ta = document.getElementById("noteArea");
  ta.value = await loadNote(idx);
  let saveTimer;
  ta.addEventListener("input", ()=>{ clearTimeout(saveTimer); saveTimer = setTimeout(()=> saveNote(idx, ta.value), 500); });

  document.getElementById("prevBtn").addEventListener("click", ()=>{ if(idx>0) openChapter(idx-1); window.scrollTo(0,0); });
  document.getElementById("nextBtn").addEventListener("click", ()=>{ if(idx<CHAPTERS.length-1) openChapter(idx+1); window.scrollTo(0,0); });
  document.getElementById("tocLink").addEventListener("click", showCover);
  window.scrollTo(0,0);
}

function showCover(){
  document.getElementById("view-chapter").classList.add("hidden");
  document.getElementById("view-cover").classList.remove("hidden");
  window.scrollTo(0,0);
}

document.getElementById("btnToc").addEventListener("click", showCover);
document.getElementById("introCard").addEventListener("click", ()=> openChapter(0));

document.getElementById("btnSerif").addEventListener("click", ()=>{
  const b = document.body;
  const on = b.getAttribute("data-serif")==="on";
  b.setAttribute("data-serif", on?"off":"on");
});
document.getElementById("fs-sm").addEventListener("click", ()=> document.body.setAttribute("data-fontsize","sm"));
document.getElementById("fs-lg").addEventListener("click", ()=> document.body.setAttribute("data-fontsize","lg"));
document.querySelectorAll("[data-theme-btn]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.body.setAttribute("data-theme", btn.dataset.themeBtn);
    document.querySelectorAll("[data-theme-btn]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

renderTocInline();
</script>
</body>
</html>
